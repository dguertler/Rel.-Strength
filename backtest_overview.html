<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── GWS-Analyse (identisch zu backtest.html) ─────────────────────────────────
function analyzeStructure(ohlcv) {
  if (!ohlcv || ohlcv.length < 30) return null;
  const n = ohlcv.length;
  const highs  = ohlcv.map(d => d.h);
  const lows   = ohlcv.map(d => d.l);
  const closes = ohlcv.map(d => d.c);
  const swingHighs = [];
  for (let i = 2; i < n - 2; i++)
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] && highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcv[i].d, price: highs[i] });
  const swingLows = [];
  for (let i = 2; i < n - 2; i++)
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] && lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcv[i].d, price: lows[i] });
  const gwsdCandidates = [];
  for (let j = 1; j < swingLows.length; j++) {
    const tiefNeu = swingLows[j], tiefAlt = swingLows[j - 1];
    if (tiefNeu.price < tiefAlt.price) {
      const hoch = swingHighs.filter(sh => sh.idx > tiefAlt.idx && sh.idx < tiefNeu.idx);
      if (hoch.length > 0) gwsdCandidates.push(hoch.reduce((b, h) => h.price > b.price ? h : b));
    }
  }
  const gwsdHigh = gwsdCandidates.length > 0 ? gwsdCandidates[gwsdCandidates.length - 1] : null;
  let breakoutIdx = null;
  if (gwsdHigh) for (let i = gwsdHigh.idx + 1; i < n; i++) if (closes[i] > gwsdHigh.price) { breakoutIdx = i; break; }
  let trend = 'neutral';
  if (swingHighs.length >= 2) trend = swingHighs[swingHighs.length-1].price > swingHighs[swingHighs.length-2].price ? 'bullish' : 'bearish';
  return { gwsdHigh, breakoutPrice: gwsdHigh?.price ?? null, breakoutIdx, broken: gwsdHigh !== null && breakoutIdx !== null, trend };
}

function analyzeWeeklyStructure(ohlcvW, ohlcvD = null) {
  if (!ohlcvW || ohlcvW.length < 15) return null;
  const n = ohlcvW.length;
  const highs  = ohlcvW.map(d => d.h);
  const lows   = ohlcvW.map(d => d.l);
  const closes = ohlcvW.map(d => d.c);
  const swingHighs = [];
  for (let i = 1; i < n - 1; i++)
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i+1])
      swingHighs.push({ idx: i, date: ohlcvW[i].d, price: highs[i] });
  const swingLows = [];
  for (let i = 1; i < n - 1; i++)
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i+1])
      swingLows.push({ idx: i, date: ohlcvW[i].d, price: lows[i] });
  const gwswCandidates = [];
  let lastLow = null;
  for (let j = 1; j < swingLows.length; j++) {
    const tiefNeu = swingLows[j], tiefAlt = swingLows[j - 1];
    if (tiefNeu.price < tiefAlt.price && (lastLow === null || tiefNeu.price < lastLow.price)) {
      const hoch = swingHighs.filter(sh => sh.idx > tiefAlt.idx && sh.idx < tiefNeu.idx);
      if (hoch.length > 0) { gwswCandidates.push(hoch.reduce((b, h) => h.price > b.price ? h : b)); lastLow = tiefNeu; }
    }
  }
  const gwswHigh = gwswCandidates.length > 0 ? gwswCandidates[gwswCandidates.length - 1] : null;
  let breakoutIdx = null;
  if (gwswHigh) for (let i = gwswHigh.idx + 1; i < n; i++) if (closes[i] > gwswHigh.price) { breakoutIdx = i; break; }
  const hasDailyCandles = Array.isArray(ohlcvD) && ohlcvD.length > 0;
  const broken = gwswHigh !== null && (hasDailyCandles ? ohlcvD.some(d => d.d > gwswHigh.date && d.c > gwswHigh.price) : breakoutIdx !== null);
  return { gwswHigh, breakoutPrice: gwswHigh?.price ?? null, breakoutIdx, broken };
}

function analyze4HStructure(ohlcv4h) {
  if (!ohlcv4h || ohlcv4h.length < 8) return null;
  const n = ohlcv4h.length;
  const highs  = ohlcv4h.map(d => d.h);
  const lows   = ohlcv4h.map(d => d.l);
  const closes = ohlcv4h.map(d => d.c);
  const swingHighs = [];
  for (let i = 2; i < n - 2; i++)
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] && highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcv4h[i].d, price: highs[i] });
  const swingLows = [];
  for (let i = 2; i < n - 2; i++)
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] && lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcv4h[i].d, price: lows[i] });
  const gws4hCandidates = [];
  let lastLow = null;
  for (let j = 1; j < swingLows.length; j++) {
    const tiefNeu = swingLows[j], tiefAlt = swingLows[j - 1];
    if (tiefNeu.price < tiefAlt.price && (lastLow === null || tiefNeu.price < lastLow.price)) {
      const hoch = swingHighs.filter(sh => sh.idx > tiefAlt.idx && sh.idx < tiefNeu.idx);
      if (hoch.length > 0) { gws4hCandidates.push(hoch.reduce((b, h) => h.price > b.price ? h : b)); lastLow = tiefNeu; }
    }
  }
  const gws4hHigh = gws4hCandidates.length > 0 ? gws4hCandidates[gws4hCandidates.length - 1] : null;
  let breakout4hIdx = null;
  if (gws4hHigh) for (let i = gws4hHigh.idx + 1; i < n; i++) if (closes[i] > gws4hHigh.price) { breakout4hIdx = i; break; }
  return { gws4hHigh, breakout4hIdx, broken4h: gws4hHigh === null || breakout4hIdx !== null };
}

function getWeekEnd(s) {
  const d = new Date(s + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + 6);
  return d.toISOString().slice(0, 10);
}

// ── Trade-Simulation ──────────────────────────────────────────────────────────
const CAPITAL = 10000;
const MAX_RISK = 1000;

function simulateTrades(ohlcv_w, ohlcv_d, ohlcv_4h) {
  if (!ohlcv_w || ohlcv_w.length < 15) return [];

  const weekRows = ohlcv_w.map((week, i) => {
    const weekEnd  = getWeekEnd(week.d);
    const wSlice   = ohlcv_w.slice(Math.max(0, i - 59), i + 1);
    const dHistory = ohlcv_d.filter(d => d.d <= weekEnd);
    const dSlice   = dHistory.slice(-60);
    const h4Slice  = ohlcv_4h.filter(d => d.d.slice(0, 10) <= weekEnd).slice(-90);
    const structW     = analyzeWeeklyStructure(wSlice, dHistory);
    const structDFull = analyzeStructure(dHistory);
    const has4h       = h4Slice.length >= 8;
    const struct4H    = has4h ? analyze4HStructure(h4Slice) : null;
    const pW  = structW?.broken     ? 1 : 0;
    const pD  = structDFull?.broken ? 1 : 0;
    const p4H = (has4h && struct4H?.broken) ? 1 : 0;
    const pts = pW + pD + (has4h ? p4H : 0);
    return { week, i, weekEnd, wSlice, dSlice, dHistory, h4Slice, structW, structDFull, struct4H, pW, pD, p4H, has4h, pts };
  });

  const trades = [];
  let inTrade = false, entry = null, peakPrice = 0;

  for (let i = 1; i < weekRows.length; i++) {
    const prev = weekRows[i - 1], curr = weekRows[i];

    if (!inTrade) {
      if (prev.pts < 3 && curr.pts === 3) {
        const newD  = prev.pD  === 0 && curr.pD  === 1;
        const newW  = prev.pW  === 0 && curr.pW  === 1;
        const new4H = prev.p4H === 0 && curr.p4H === 1;
        let entryPrice, stopPrice, trigger, entryDate;

        if (new4H) {
          entryPrice = curr.struct4H?.breakoutPrice ?? curr.structDFull?.breakoutPrice;
          stopPrice  = curr.structDFull?.breakoutPrice ?? curr.structW?.breakoutPrice;
          trigger    = '4H';
          entryDate  = curr.week.d;
        } else if (newD) {
          entryPrice = curr.structDFull?.breakoutPrice;
          stopPrice  = curr.structW?.breakoutPrice ?? curr.structW?.gwswHigh?.price;
          trigger    = 'D';
          const gwsD = curr.structDFull?.gwsdHigh;
          entryDate  = gwsD ? curr.dHistory.find(d => d.d > gwsD.date && d.c > gwsD.price)?.d : curr.week.d;
        } else if (newW) {
          entryPrice = curr.structW?.breakoutPrice;
          stopPrice  = curr.structDFull?.breakoutPrice ?? curr.structDFull?.gwsdHigh?.price;
          trigger    = 'W';
          const gwsW = curr.structW?.gwswHigh;
          entryDate  = gwsW ? curr.dHistory.find(d => d.d > gwsW.date && d.c > gwsW.price)?.d : curr.week.d;
        } else {
          entryPrice = curr.structDFull?.breakoutPrice;
          stopPrice  = curr.structW?.breakoutPrice;
          trigger    = '?';
          entryDate  = curr.week.d;
        }

        if (!entryPrice || !stopPrice || entryPrice <= stopPrice) continue;
        const riskPerShare = entryPrice - stopPrice;
        let shares = Math.floor(MAX_RISK / riskPerShare);
        if (shares * entryPrice > CAPITAL) shares = Math.floor(CAPITAL / entryPrice);
        if (shares < 1) continue;

        entry = { trigger, entryDate: entryDate ?? curr.week.d, weeklyDate: curr.week.d, entryPrice, stopPrice, shares, invested: shares * entryPrice, entryWeekIdx: i };
        peakPrice = entryPrice;
        inTrade = true;
      }
    } else {
      peakPrice = Math.max(peakPrice, curr.week.h);
      if (curr.pD === 0) {
        const sigDay  = curr.dHistory.find(d => d.d >= curr.weekEnd && d.c < (curr.structDFull?.breakoutPrice ?? 0));
        const exitDay = curr.dHistory.find(d => sigDay && d.d > sigDay.d);
        const exitPrice = exitDay?.o ?? curr.week.c;
        const exitDate  = exitDay?.d  ?? curr.week.d;
        const pnl = (exitPrice - entry.entryPrice) * entry.shares;
        trades.push({ ...entry, exitDate, exitPrice, pnl, pnlPct: (exitPrice / entry.entryPrice - 1) * 100, isWin: pnl > 0, isOpen: false, holdingWeeks: i - entry.entryWeekIdx });
        inTrade = false; entry = null;
      }
    }
  }

  if (inTrade && entry) {
    const last = weekRows[weekRows.length - 1];
    const exitPrice = last.week.c;
    peakPrice = Math.max(peakPrice, last.week.h);
    const currentDD = peakPrice > exitPrice ? (peakPrice - exitPrice) / peakPrice * 100 : 0;
    const pnl = (exitPrice - entry.entryPrice) * entry.shares;
    trades.push({ ...entry, exitDate: last.week.d, exitPrice, pnl, pnlPct: (exitPrice / entry.entryPrice - 1) * 100, isWin: pnl > 0, isOpen: true, holdingWeeks: weekRows.length - 1 - entry.entryWeekIdx, currentDD, peakPrice });
  }

  return trades;
}

function calcKpis(trades) {
  const closed    = trades.filter(t => !t.isOpen);
  const openTrade = trades.find(t => t.isOpen) ?? null;
  if (closed.length === 0) return null;
  const wins   = closed.filter(t =>  t.isWin);
  const losses = closed.filter(t => !t.isWin);
  let equity = CAPITAL, peak = CAPITAL, maxDD = 0;
  const equityCurve = [{ equity: CAPITAL }];
  for (const t of closed) {
    equity += t.pnl;
    peak    = Math.max(peak, equity);
    maxDD   = Math.max(maxDD, (peak - equity) / peak * 100);
    equityCurve.push({ date: t.exitDate, equity });
  }
  const grossProfit = wins.reduce((s, t)   => s + t.pnl, 0);
  const grossLoss   = losses.reduce((s, t) => s + t.pnl, 0);
  const openPnl     = openTrade?.pnl ?? 0;
  return {
    nTrades:      closed.length,
    nLosses:      losses.length,
    nWins:        wins.length,
    winrate:      wins.length / closed.length * 100,
    totalPnl:     equity - CAPITAL,
    totalReturn:  (equity / CAPITAL - 1) * 100,
    maxDD,
    grossProfit,
    grossLoss,
    profitFactor: grossLoss < 0 ? Math.abs(grossProfit / grossLoss) : null,
    avgWin:       wins.length   > 0 ? grossProfit / wins.length            : 0,
    avgLoss:      losses.length > 0 ? Math.abs(grossLoss) / losses.length  : 0,
    gesamtGewinn: (equity - CAPITAL) + openPnl,
    hasOpen:      !!openTrade,
    equityCurve,
  };
}

// ── Farb-Helfer ───────────────────────────────────────────────────────────────
const green = '#4ade80', red = '#f87171', neutral = '#64748b';
const pnlColor = v => v > 0 ? green : v < 0 ? red : neutral;
const wr = v => v >= 60 ? green : v >= 45 ? '#fbbf24' : red;
const fmt = (v, d = 1) => (v >= 0 ? '+' : '') + v.toFixed(d);
const IDX_COLOR = { QQQ: '#38bdf8', SPX: '#a78bfa', DAX: '#fb923c' };

// ── Equity-Kurve ──────────────────────────────────────────────────────────────
function EquityCurve({ curve }) {
  const W = 600, H = 90;
  const PL = 52, PR = 12, PT = 8, PB = 22;
  const cW = W - PL - PR, cH = H - PT - PB;
  const equities = curve.map(p => p.equity);
  const minE = Math.min(...equities), maxE = Math.max(...equities);
  const range = maxE - minE || 1;
  const toX = i => PL + (i / (curve.length - 1)) * cW;
  const toY = e => PT + cH - ((e - minE) / range) * cH;
  const pts = curve.map((p, i) => `${toX(i)},${toY(p.equity)}`).join(' ');
  const yBase = toY(10000);
  return (
    <div style={{marginBottom:8}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:W,display:'block',
        background:'#07090f',borderRadius:6,border:'1px solid #1e293b'}}>
        <line x1={PL} x2={W-PR} y1={yBase} y2={yBase} stroke="#1e293b" strokeWidth="1" strokeDasharray="4,3"/>
        <text x={PL-4} y={yBase+3} fill="#334155" fontSize="7" textAnchor="end">10k</text>
        <polyline points={pts} fill="none" stroke="#4ade80" strokeWidth="1.5"/>
        {curve.map((p, i) => (
          <circle key={i} cx={toX(i)} cy={toY(p.equity)} r="2.5"
            fill={p.equity >= 10000 ? '#4ade80' : '#f87171'} opacity="0.9"/>
        ))}
        <text x={PL-4} y={PT+6} fill="#475569" fontSize="7" textAnchor="end">
          {maxE >= 10000 ? '+' : ''}€{(maxE-10000).toFixed(0)}
        </text>
        <text x={PL-4} y={H-PB+6} fill="#475569" fontSize="7" textAnchor="end">
          {minE >= 10000 ? '+' : ''}€{(minE-10000).toFixed(0)}
        </text>
        <text x={W/2} y={H-3} fill="#334155" fontSize="7" textAnchor="middle">
          Equity-Kurve · {curve.length - 1} abgeschl. Trades · Start €10.000
        </text>
      </svg>
    </div>
  );
}

// ── Detail-Panel (klappt in der Tabelle auf) ──────────────────────────────────
function StockDetailPanel({ stock, onClose }) {
  const k      = stock.kpis;
  const trades = stock.trades ?? [];
  const ot     = stock.openTrade;
  const gesamtGewinn = k ? k.gesamtGewinn : (ot?.pnl ?? 0);
  return (
    <div style={{padding:'14px 10px',background:'#070c18',borderTop:'1px solid #1e293b'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <span style={{fontFamily:'monospace',fontWeight:800,fontSize:14,color:'#f1f5f9'}}>{stock.ticker}</span>
        <a href={`backtest.html?t=${encodeURIComponent(stock.ticker)}`}
          style={{fontSize:11,color:'#38bdf8',fontFamily:'monospace',textDecoration:'none'}}>
          → Chartansicht
        </a>
        <button onClick={onClose}
          style={{marginLeft:'auto',background:'transparent',border:'1px solid #334155',borderRadius:4,
            color:'#64748b',padding:'2px 8px',cursor:'pointer',fontFamily:'monospace',fontSize:11}}>
          ✕
        </button>
      </div>

      {k && (
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:6,marginBottom:8}}>
            {[
              ['Trades',        k.nTrades,                                                    '', '#94a3b8'],
              ['Winrate',       k.winrate.toFixed(0),                                         '%', k.winrate >= 50 ? green : red],
              ['Profit Faktor', k.profitFactor != null ? k.profitFactor.toFixed(2) : '∞',    '', k.profitFactor == null || k.profitFactor >= 1 ? green : red],
              ['Rendite',       fmt(k.totalReturn, 1),                                        '%', k.totalReturn >= 0 ? green : red],
              ['Max Drawdown',  k.maxDD.toFixed(1),                                           '%', red],
              ['Ø Win',         '+€' + k.avgWin.toFixed(0),                                   '', green],
              ['Ø Loss',        '−€' + k.avgLoss.toFixed(0),                                  '', red],
              ['Gesamtgewinn',  (gesamtGewinn >= 0 ? '+€' : '−€') + Math.abs(gesamtGewinn).toFixed(0), '', pnlColor(gesamtGewinn)],
            ].map(([label, val, unit, color]) => (
              <div key={label} style={{background:'#060b14',border:'1px solid #1e293b',borderRadius:8,padding:'8px 10px',fontFamily:'monospace'}}>
                <div style={{fontSize:9,color:'#475569',marginBottom:3}}>{label}</div>
                <div style={{fontSize:17,fontWeight:800,color,lineHeight:1}}>
                  {val}<span style={{fontSize:10,fontWeight:400}}>{unit}</span>
                </div>
              </div>
            ))}
          </div>
          {k.equityCurve?.length > 1 && <EquityCurve curve={k.equityCurve}/>}
        </>
      )}

      {trades.length > 0 && (
        <div style={{background:'#060b14',border:'1px solid #1e293b',borderRadius:8,overflowX:'auto',marginTop:6}}>
          <div style={{minWidth:440}}>
            <div style={{display:'grid',gridTemplateColumns:'96px 28px 80px 80px 80px 68px 60px',
              gap:0,background:'#0a0f1e',borderBottom:'1px solid #1e293b',padding:'5px 10px',
              fontSize:10,fontWeight:700,color:'#475569',fontFamily:'monospace',letterSpacing:'0.04em'}}>
              <span>Entry</span><span>TF</span>
              <span style={{textAlign:'right'}}>Entry €</span>
              <span style={{textAlign:'right'}}>Exit €</span>
              <span style={{textAlign:'right'}}>Gewinn €</span>
              <span style={{textAlign:'right'}}>Rendite</span>
              <span style={{textAlign:'right'}}>Wochen</span>
            </div>
            {[...trades].reverse().map((t, i) => (
              <div key={i} style={{display:'grid',gridTemplateColumns:'96px 28px 80px 80px 80px 68px 60px',
                gap:0,padding:'4px 10px',borderBottom:'1px solid #0a0f1e',alignItems:'center',
                background: t.isOpen ? '#0a1520' : t.isWin ? '#061206' : '#120606'}}>
                <span style={{fontFamily:'monospace',fontSize:11,color:'#94a3b8'}}>{t.entryDate}</span>
                <span style={{fontFamily:'monospace',fontSize:10,fontWeight:700,
                  color: t.trigger==='4H'?'#a78bfa':t.trigger==='D'?'#38bdf8':'#fbbf24'}}>
                  {t.trigger}
                </span>
                <span style={{textAlign:'right',fontFamily:'monospace',fontSize:11,color:'#cbd5e1'}}>
                  {t.entryPrice.toFixed(2)}
                </span>
                <span style={{textAlign:'right',fontFamily:'monospace',fontSize:11,color:t.isOpen?'#fbbf24':'#cbd5e1'}}>
                  {t.isOpen ? 'offen ◆' : t.exitPrice.toFixed(2)}
                </span>
                <span style={{textAlign:'right',fontFamily:'monospace',fontSize:11,fontWeight:700,color:t.pnl>=0?green:red}}>
                  {t.pnl>=0?'+':''}{t.pnl.toFixed(0)}
                </span>
                <span style={{textAlign:'right',fontFamily:'monospace',fontSize:11,color:t.pnlPct>=0?green:red}}>
                  {t.pnlPct>=0?'+':''}{t.pnlPct.toFixed(1)}%
                </span>
                <span style={{textAlign:'right',fontFamily:'monospace',fontSize:11,color:'#475569'}}>
                  {t.holdingWeeks}W
                </span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Haupt-App ─────────────────────────────────────────────────────────────────
function OverviewApp() {
  const { useRef } = React;
  const [rsMap,         setRsMap]         = useState(null);
  const [stocks,        setStocks]        = useState([]);
  const [loadingRs,     setLoadingRs]     = useState(true);
  const [loadingTrades, setLoadingTrades] = useState(false);
  const [errors,        setErrors]        = useState([]);
  const [filter,        setFilter]        = useState('QQQ');
  const [sortKey,       setSortKey]       = useState('totalReturn');
  const [sortAsc,       setSortAsc]       = useState(false);
  const [search,        setSearch]        = useState('');
  const [selected,      setSelected]      = useState(null);
  const cache = useRef({});

  useEffect(() => {
    const sources = [
      { file: 'rs_full.json',  index: 'QQQ' },
      { file: 'rs_sp500.json', index: 'SPX' },
      { file: 'rs_dax.json',   index: 'DAX' },
    ];
    const errs = [];
    const map  = {};

    Promise.allSettled(sources.map(s =>
      fetch(s.file).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
                   .then(d => ({ ...d, _index: s.index }))
    )).then(results => {
      results.forEach((res, ri) => {
        if (res.status === 'rejected') { errs.push(`${sources[ri].file}: ${res.reason}`); return; }
        const d = res.value;
        map[d._index] = (d.data || []).map(entry => ({
          ticker:   entry.ticker,
          index:    d._index,
          score:    entry.score ?? 0,
          ohlcv_w:  entry.ohlcv_w  || [],
          ohlcv_d:  entry.ohlcv    || [],
          ohlcv_4h: entry.ohlcv_4h || [],
        }));
      });
      setRsMap(map);
      setErrors(errs);
      setLoadingRs(false);
    });
  }, []);

  useEffect(() => {
    if (!rsMap) return;
    setSelected(null);
    if (cache.current[filter]) { setStocks(cache.current[filter]); return; }

    const sources = filter === 'ALL'
      ? Object.values(rsMap).flat()
      : (rsMap[filter] || []);

    setStocks([]);
    setLoadingTrades(true);

    Promise.allSettled(
      sources.map(s =>
        fetch(`backtest_${s.ticker.toLowerCase().replace(/\./g, '_')}.json`)
          .then(r => r.ok ? r.json() : null).catch(() => null)
          .then(bt => {
            const src = (bt && bt.ohlcv_w && bt.ohlcv_d) ? bt : null;
            const raw_w  = src ? src.ohlcv_w  : s.ohlcv_w;
            const raw_d  = src ? src.ohlcv_d  : s.ohlcv_d;
            const raw_4h = src ? (src.ohlcv_4h || []) : s.ohlcv_4h;
            const ohlcv_w = raw_w.slice(-104);
            const cutDate = ohlcv_w[0]?.d ?? '2000-01-01';
            return { ...s, hasFull: !!src,
              ohlcv_w,
              ohlcv_d:  raw_d.filter(d => d.d >= cutDate),
              ohlcv_4h: raw_4h.filter(d => d.d.slice(0,10) >= cutDate),
            };
          })
      )
    ).then(results => {
      const all = [];
      for (const res of results) {
        if (res.status !== 'fulfilled') continue;
        const s      = res.value;
        const trades = simulateTrades(s.ohlcv_w, s.ohlcv_d, s.ohlcv_4h);
        if (trades.length === 0) continue;
        const kpis      = calcKpis(trades);
        const openTrade = trades.find(t => t.isOpen) ?? null;
        all.push({ ticker: s.ticker, index: s.index, score: s.score, kpis, trades, hasOpen: !!openTrade, openTrade, hasFull: s.hasFull });
      }
      cache.current[filter] = all;
      setStocks(all);
      setLoadingTrades(false);
    });
  }, [rsMap, filter]);

  const filtered = useMemo(() => {
    let s = stocks;
    if (filter !== 'ALL') s = s.filter(x => x.index === filter);
    if (search) s = s.filter(x => x.ticker.toLowerCase().includes(search.toLowerCase()));
    s = [...s].sort((a, b) => {
      let av = a.kpis?.[sortKey] ?? -Infinity;
      let bv = b.kpis?.[sortKey] ?? -Infinity;
      if (sortKey === 'ticker') { av = a.ticker; bv = b.ticker; }
      if (sortKey === 'index')  { av = a.index;  bv = b.index; }
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ?  1 : -1;
      return 0;
    });
    return s;
  }, [stocks, filter, sortKey, sortAsc, search]);

  const summary = useMemo(() => {
    const withKpis = filtered.filter(x => x.kpis);
    const openOnly = filtered.filter(x => !x.kpis && x.openTrade);
    if (!withKpis.length && !openOnly.length) return null;
    const gp = withKpis.reduce((s, x) => s + (x.kpis.grossProfit ?? 0), 0);
    const gl = withKpis.reduce((s, x) => s + (x.kpis.grossLoss   ?? 0), 0);
    return {
      total:        withKpis.length + openOnly.length,
      trades:       withKpis.reduce((s, x) => s + x.kpis.nTrades + (x.openTrade ? 1 : 0), 0) + openOnly.length,
      totalPnl:     withKpis.reduce((s, x) => s + x.kpis.totalPnl + (x.openTrade?.pnl ?? 0), 0)
                    + openOnly.reduce((s, x) => s + x.openTrade.pnl, 0),
      avgReturn:    withKpis.length ? withKpis.reduce((s, x) => s + x.kpis.totalReturn, 0) / withKpis.length : 0,
      avgWr:        withKpis.length ? withKpis.reduce((s, x) => s + x.kpis.winrate, 0) / withKpis.length : 0,
      winners:      withKpis.filter(x => x.kpis.totalPnl > 0).length,
      profitFactor: gl < 0 ? Math.abs(gp / gl) : null,
      avgMaxDD:     withKpis.length ? withKpis.reduce((s, x) => s + x.kpis.maxDD, 0) / withKpis.length : 0,
    };
  }, [filtered]);

  const sortHeader = (key, label) => (
    <th onClick={() => { if (sortKey === key) setSortAsc(p => !p); else { setSortKey(key); setSortAsc(false); } }}
      style={{ padding: '10px 12px', textAlign: 'right', color: sortKey === key ? '#f1f5f9' : '#64748b',
        fontSize: 11, fontFamily: 'monospace', cursor: 'pointer', userSelect: 'none',
        borderBottom: '1px solid #1e293b', whiteSpace: 'nowrap' }}>
      {label}{sortKey === key ? (sortAsc ? ' ↑' : ' ↓') : ''}
    </th>
  );

  if (loadingRs) return (
    <div style={{ padding: '100px 24px', textAlign: 'center', color: '#475569', fontFamily: 'monospace', fontSize: 14 }}>
      Lade Index-Daten…
    </div>
  );

  return (
    <div style={{ paddingTop: 60, paddingBottom: 40, maxWidth: 1100, margin: '0 auto', padding: '60px 16px 40px' }}>

      {errors.map((e, i) => (
        <div key={i} style={{ background: '#1c0a0a', border: '1px solid #7f1d1d', borderRadius: 6, padding: '8px 12px', marginBottom: 8, fontSize: 12, color: '#f87171', fontFamily: 'monospace' }}>
          ⚠ {e}
        </div>
      ))}

      <div style={{ marginBottom: 20, display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
        <span style={{ fontSize: 18, fontWeight: 700, color: '#f1f5f9', marginRight: 8 }}>Backtest Übersicht</span>
        {['ALL', 'QQQ', 'SPX', 'DAX'].map(k => (
          <button key={k} onClick={() => setFilter(k)}
            style={{ background: filter === k ? (k === 'ALL' ? '#1e293b' : IDX_COLOR[k] + '22') : 'transparent',
              border: `1px solid ${filter === k ? (k === 'ALL' ? '#475569' : IDX_COLOR[k]) : '#1e293b'}`,
              borderRadius: 6, padding: '5px 14px', color: filter === k ? (k === 'ALL' ? '#f1f5f9' : IDX_COLOR[k]) : '#64748b',
              fontFamily: 'monospace', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
            {k}
          </button>
        ))}
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Suche Ticker…"
          style={{ marginLeft: 'auto', background: '#1e293b', border: '1px solid #334155', borderRadius: 6,
            color: '#f1f5f9', padding: '5px 10px', fontFamily: 'monospace', fontSize: 12, width: 130 }} />
      </div>

      {summary && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginBottom: 20 }}>
          {[
            ['Aktien mit Trades',  summary.total, null],
            ['Trades gesamt',      summary.trades, null],
            ['Gewinner-Aktien',    `${summary.winners} / ${summary.total}`, null],
            ['Gesamt P&L',         fmt(summary.totalPnl, 0) + ' €', summary.totalPnl],
            ['Profit Faktor',      summary.profitFactor != null ? summary.profitFactor.toFixed(2) : '–', summary.profitFactor != null ? summary.profitFactor - 1.5 : 0],
            ['Ø Max Drawdown',     summary.avgMaxDD > 0 ? `-${summary.avgMaxDD.toFixed(1)} %` : '–', -summary.avgMaxDD],
            ['Ø Return pro Aktie', fmt(summary.avgReturn) + ' %', summary.avgReturn],
            ['Ø Win Rate',         summary.avgWr.toFixed(1) + ' %', summary.avgWr - 50],
          ].map(([label, val, col]) => (
            <div key={label} style={{ background: '#0d1526', border: '1px solid #1e293b', borderRadius: 8,
              padding: '12px 18px', flex: '1 1 150px', minWidth: 130 }}>
              <div style={{ fontSize: 10, color: '#64748b', fontFamily: 'monospace', marginBottom: 4 }}>{label}</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: col !== null ? pnlColor(col) : '#e2e8f0', fontFamily: 'monospace' }}>{val}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ background: '#0a101e', border: '1px solid #1e293b', borderRadius: 10, overflow: 'auto' }}>
        <table>
          <thead>
            <tr>
              <th onClick={() => { if (sortKey === 'ticker') setSortAsc(p => !p); else { setSortKey('ticker'); setSortAsc(true); } }}
                style={{ padding: '10px 12px', textAlign: 'left', color: sortKey === 'ticker' ? '#f1f5f9' : '#64748b',
                  fontSize: 11, fontFamily: 'monospace', cursor: 'pointer', userSelect: 'none',
                  borderBottom: '1px solid #1e293b' }}>
                Ticker{sortKey === 'ticker' ? (sortAsc ? ' ↑' : ' ↓') : ''}
              </th>
              <th onClick={() => { if (sortKey === 'index') setSortAsc(p => !p); else { setSortKey('index'); setSortAsc(true); } }}
                style={{ padding: '10px 12px', textAlign: 'left', color: sortKey === 'index' ? '#f1f5f9' : '#64748b',
                  fontSize: 11, fontFamily: 'monospace', cursor: 'pointer', userSelect: 'none',
                  borderBottom: '1px solid #1e293b' }}>
                Index{sortKey === 'index' ? (sortAsc ? ' ↑' : ' ↓') : ''}
              </th>
              {sortHeader('nTrades',     'Trades')}
              {sortHeader('totalPnl',    'P&L €')}
              {sortHeader('totalReturn', 'Return %')}
              {sortHeader('winrate',     'Win Rate')}
              {sortHeader('maxDD',       'Max DD')}
            </tr>
          </thead>
          <tbody>
            {filtered.map(stock => {
              const k  = stock.kpis;
              const ot = stock.openTrade;
              const rowBg     = stock.hasOpen ? '#0e0900' : undefined;
              const borderCol = stock.hasOpen ? '#92400e' : 'transparent';
              const isSelected = selected === stock.ticker;
              return (
                <React.Fragment key={stock.ticker}>
                  <tr className="data-row"
                    onClick={() => setSelected(prev => prev === stock.ticker ? null : stock.ticker)}
                    style={{ borderLeft: `3px solid ${isSelected ? '#3b82f6' : borderCol}`, background: isSelected ? '#0d1a2e' : rowBg }}>
                    <td style={{ padding: '8px 12px', fontFamily: 'monospace', fontWeight: 700, fontSize: 13, color: '#f1f5f9', borderBottom: '1px solid #0d1526' }}>
                      {stock.ticker}
                      {stock.hasOpen && <span style={{ marginLeft: 6, fontSize: 9, background: '#78350f', color: '#fbbf24', borderRadius: 3, padding: '1px 5px', fontWeight: 700 }}>OFFEN</span>}
                    </td>
                    <td style={{ padding: '8px 12px', borderBottom: '1px solid #0d1526' }}>
                      <span style={{ fontFamily: 'monospace', fontSize: 11, fontWeight: 700, color: IDX_COLOR[stock.index] ?? '#94a3b8',
                        background: (IDX_COLOR[stock.index] ?? '#94a3b8') + '15', borderRadius: 4, padding: '2px 6px' }}>
                        {stock.index}
                      </span>
                    </td>
                    {k ? <>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: '#94a3b8', borderBottom: '1px solid #0d1526' }}>{k.nTrades + (stock.hasOpen ? 1 : 0)}</td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', minWidth: 90, color: pnlColor(k.totalPnl + (ot?.pnl ?? 0)), borderBottom: '1px solid #0d1526' }}>
                        {fmt(k.totalPnl + (ot?.pnl ?? 0), 0)} €
                      </td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, fontWeight: 600, color: pnlColor(k.totalReturn + (ot?.pnlPct ?? 0)), borderBottom: '1px solid #0d1526' }}>
                        {fmt(k.totalReturn + (ot?.pnlPct ?? 0))} %
                      </td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: wr(k.winrate), borderBottom: '1px solid #0d1526' }}>
                        {k.winrate.toFixed(0)} %
                        <span style={{ color: '#334155', fontSize: 10, marginLeft: 4 }}>({k.nWins}/{k.nTrades})</span>
                      </td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: red, borderBottom: '1px solid #0d1526' }}>
                        {k.maxDD > 0 ? `-${k.maxDD.toFixed(1)} %` : '–'}
                      </td>
                    </> : ot ? <>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: '#94a3b8', borderBottom: '1px solid #0d1526' }}>1</td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', minWidth: 90, color: pnlColor(ot.pnl), borderBottom: '1px solid #0d1526' }}>
                        {fmt(ot.pnl, 0)} €
                      </td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, fontWeight: 600, color: pnlColor(ot.pnlPct), borderBottom: '1px solid #0d1526' }}>
                        {fmt(ot.pnlPct)} %
                      </td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: '#334155', borderBottom: '1px solid #0d1526' }}>–</td>
                      <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontSize: 12, color: ot.currentDD > 5 ? '#f59e0b' : '#334155', borderBottom: '1px solid #0d1526' }}>
                        {ot.currentDD > 0.5 ? `-${ot.currentDD.toFixed(1)} %` : '–'}
                      </td>
                    </> : <>
                      {[0,1,2,3,4].map(j => <td key={j} style={{ padding: '8px 12px', textAlign: 'right', color: '#334155', fontSize: 12, fontFamily: 'monospace', borderBottom: '1px solid #0d1526' }}>–</td>)}
                    </>}
                  </tr>
                  {isSelected && (
                    <tr>
                      <td colSpan={7} style={{ padding: 0, borderBottom: '2px solid #1e3a5f' }}>
                        <StockDetailPanel stock={stock} onClose={() => setSelected(null)}/>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{ padding: 32, textAlign: 'center', color: '#334155', fontFamily: 'monospace', fontSize: 13 }}>
            Keine Ergebnisse
          </div>
        )}
      </div>

      {loadingTrades && (
        <div style={{ padding: '32px', textAlign: 'center', color: '#475569', fontFamily: 'monospace', fontSize: 13 }}>
          Lade {filter}…
        </div>
      )}

      <div style={{ marginTop: 12, color: '#334155', fontSize: 11, fontFamily: 'monospace' }}>
        Basis: {stocks.length} Aktien · Kapital €10.000 · Max Risiko €1.000/Trade · Daten: letzte 2 Jahre · Klick auf Zeile → Details aufklappen
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OverviewApp />);
</script>
</body>
</html>
