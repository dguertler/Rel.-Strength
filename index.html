<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS · QQQ Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select, button { outline: none; }
    .chart-wrap { position: relative; }
    .chart-wrap svg { display: block; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useCallback, useEffect } = React;

// ── Struktur-Analyse ───────────────────────────────────────────────────────
function analyzeStructure(ohlcv) {
  if (!ohlcv || ohlcv.length < 10) return null;
  const n = ohlcv.length;
  const highs  = ohlcv.map(d => d.h);
  const lows   = ohlcv.map(d => d.l);
  const closes = ohlcv.map(d => d.c);

  // Swing-Hochs & -Tiefs (Lookback 2 Kerzen links/rechts)
  const swingHighs = [];
  for (let i = 3; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] && highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcv[i].d, price: highs[i] });
  }
  const swingLows = [];
  for (let i = 3; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] && lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcv[i].d, price: lows[i] });
  }

  const currentClose = closes[n - 1];
  const currentHigh  = highs[n - 1];

  // Letztes signifikantes Downmove-Hoch (Retracement-Hoch):
  // Ein Swing-Hoch gefolgt von mindestens 5% Rücksetzer darunter
  let lastDownmoveHigh = null;
  for (let i = swingHighs.length - 1; i >= 0; i--) {
    const sh = swingHighs[i];
    const minAfter = Math.min(...lows.slice(sh.idx));
    if (minAfter < sh.price * 0.95) { lastDownmoveHigh = sh; break; }
  }

  // Ausbruch: Close bereits über Downmove-Hoch
  const broken = lastDownmoveHigh && currentClose > lastDownmoveHigh.price;

  // "Kurz vor Ausbruch": Close oder Tageshoch innerhalb 2% unter dem Downmove-Hoch
  const nearBreakout = lastDownmoveHigh && !broken &&
    (currentHigh >= lastDownmoveHigh.price || currentClose >= lastDownmoveHigh.price * 0.98);

  // Trend aus den letzten 2 Swing-Hochs
  let trend = "neutral";
  if (swingHighs.length >= 2) {
    const last = swingHighs[swingHighs.length - 1];
    const prev = swingHighs[swingHighs.length - 2];
    if (last.price > prev.price) trend = "bullish";
    else if (last.price < prev.price) trend = "bearish";
  }

  // Setup: Breakout oder kurz davor, Trend nicht bearish
  const setup = (broken || nearBreakout) && trend !== "bearish";

  return {
    currentClose, currentHigh, lastDownmoveHigh,
    broken, nearBreakout,
    trend,
    swingHighs: swingHighs.slice(-5),
    swingLows:  swingLows.slice(-5),
    setup
  };
}

// ── Candlestick Chart ──────────────────────────────────────────────────────
function CandleChart({ ohlcv, structure }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const W = 600, H = 260;
  const PAD_LEFT = 52, PAD_RIGHT = 48, PAD_TOP = 18, PAD_BOTTOM = 32;
  const chartW = W - PAD_LEFT - PAD_RIGHT;
  const chartH = H - PAD_TOP - PAD_BOTTOM;
  const n = ohlcv.length;
  const allH = ohlcv.map(d => d.h);
  const allL = ohlcv.map(d => d.l);
  const rawMax = Math.max(...allH), rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.06;
  const maxP = rawMax + pad, minP = rawMin - pad, range = maxP - minP;
  const toY = p => PAD_TOP + (1 - (p - minP) / range) * chartH;
  const toX = i => PAD_LEFT + (i + 0.5) * (chartW / n);
  const barW = Math.max(2, chartW / n * 0.65);

  // Y-Achsen-Ticks
  const yTicks = [];
  const step = range / 5;
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * step);

  // Monats-Labels
  const monthLabels = [];
  let lastMonth = null;
  ohlcv.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) { monthLabels.push({ i, label: d.d.slice(5, 7) + "/" + d.d.slice(2, 4) }); lastMonth = m; }
  });

  // Erster Candle, der das Downmove-Hoch schließt (Close-Breakout)
  let breakoutIdx = null;
  if (structure?.lastDownmoveHigh) {
    for (let i = structure.lastDownmoveHigh.idx + 1; i < n; i++) {
      if (ohlcv[i].c > structure.lastDownmoveHigh.price) { breakoutIdx = i; break; }
    }
  }

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.round((mx - PAD_LEFT) / (chartW / n) - 0.5);
    setHover(idx >= 0 && idx < n ? idx : null);
  }, [n, chartW]);
  const hd = hover !== null ? ohlcv[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      {/* OHLC-Infozeile */}
      <div style={{height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,background:"#0a0f1e",borderBottom:"1px solid #1e293b",fontSize:10,fontFamily:"monospace"}}>
        {hd ? (
          <>
            <span style={{color:"#475569"}}>{hd.d}</span>
            <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
            <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
            <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
            <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
            <span style={{color:"#475569",marginLeft:"auto"}}>{hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%</span>
          </>
        ) : <span style={{color:"#334155"}}>Hover für OHLC-Details</span>}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)} style={{cursor:"crosshair"}}>
        <defs>
          <linearGradient id="breakoutGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#22c55e" stopOpacity="0.12"/>
            <stop offset="100%" stopColor="#22c55e" stopOpacity="0.01"/>
          </linearGradient>
          <linearGradient id="nearGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.10"/>
            <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.01"/>
          </linearGradient>
          <linearGradient id="downGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.06"/>
            <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0"/>
          </linearGradient>
        </defs>

        {/* Chart-Hintergrund */}
        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="#07090f"/>

        {/* Y-Raster */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return <g key={k}>
            <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
            <text x={PAD_LEFT-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">{val.toFixed(0)}</text>
          </g>;
        })}

        {/* Monats-Trennlinien */}
        {monthLabels.map(({i,label}) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PAD_TOP} y2={PAD_TOP+chartH} stroke="#131c2e" strokeWidth="1" strokeDasharray="2,4"/>
            <text x={toX(i)} y={PAD_TOP+chartH+14} textAnchor="middle" fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Hintergrund-Zonen: vor Breakout amber, nach Breakout grün */}
        {structure?.lastDownmoveHigh && breakoutIdx !== null && (
          <rect x={PAD_LEFT} y={PAD_TOP} width={toX(breakoutIdx)-PAD_LEFT} height={chartH} fill="url(#downGrad)"/>
        )}
        {/* Kein Close-Breakout, aber nearBreakout → amber-Zone rechts */}
        {structure?.nearBreakout && !structure?.broken && (
          <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="url(#nearGrad)"/>
        )}
        {breakoutIdx !== null && (
          <rect x={toX(breakoutIdx)-barW} y={PAD_TOP} width={chartW-(toX(breakoutIdx)-PAD_LEFT)+barW} height={chartH} fill="url(#breakoutGrad)"/>
        )}

        {/* ── Downmove-Hoch Linie (IMMER einzeichnen wenn vorhanden) ── */}
        {structure?.lastDownmoveHigh && (() => {
          const y = toY(structure.lastDownmoveHigh.price);
          const color = structure.broken ? "#22c55e" : structure.nearBreakout ? "#f97316" : "#f59e0b";
          return <>
            <rect x={PAD_LEFT} y={y} width={chartW} height={PAD_TOP+chartH-y} fill={color} opacity="0.03"/>
            <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={y} y2={y} stroke={color} strokeWidth="1.5" strokeDasharray="5,4"/>
            {/* Preis-Label links */}
            <rect x={PAD_LEFT-48} y={y-9} width={44} height={16} rx="3" fill="#0a0f1e" stroke={color} strokeWidth="0.8"/>
            <text x={PAD_LEFT-26} y={y+4} textAnchor="middle" fill={color} fontSize="9" fontWeight="700" fontFamily="monospace">{structure.lastDownmoveHigh.price.toFixed(1)}</text>
            {/* Status-Label rechts */}
            <rect x={PAD_LEFT+chartW+2} y={y-9} width={44} height={16} rx="3" fill={color+"22"} stroke={color} strokeWidth="0.8"/>
            <text x={PAD_LEFT+chartW+24} y={y+4} textAnchor="middle" fill={color} fontSize="8" fontWeight="700" fontFamily="monospace">
              {structure.broken ? "✓ BOC" : structure.nearBreakout ? "~BOC" : "Res."}
            </text>
          </>;
        })()}

        {/* ── Breakout-Candle Highlight ── */}
        {breakoutIdx !== null && (
          <rect x={toX(breakoutIdx)-barW*0.8} y={PAD_TOP} width={barW*1.6} height={chartH} fill="#22c55e" opacity="0.07" rx="1"/>
        )}

        {/* ── Candles ── */}
        {ohlcv.map((d, i) => {
          const bullish = d.c >= d.o;
          const isBreakout = i === breakoutIdx;
          const color = bullish ? "#22c55e" : "#ef4444";
          const bodyTop = toY(Math.max(d.o, d.c));
          const bodyBot = toY(Math.min(d.o, d.c));
          const bodyH = Math.max(1.5, bodyBot - bodyTop);
          const isHovered = hover === i;
          return <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={toY(d.h)} y2={toY(d.l)} stroke={color} strokeWidth={isHovered?1.5:1} opacity={isBreakout?1:0.9}/>
            <rect x={toX(i)-barW/2} y={bodyTop} width={barW} height={bodyH} fill={color} opacity={isBreakout?1:isHovered?0.95:0.8} stroke={isBreakout?"#fff":isHovered?color:"none"} strokeWidth={isBreakout?0.5:0}/>
          </g>;
        })}

        {/* Letzte Close-Linie */}
        <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={toY(ohlcv[n-1].c)} y2={toY(ohlcv[n-1].c)} stroke="#94a3b8" strokeWidth="0.6" strokeDasharray="2,3" opacity="0.4"/>
        <rect x={PAD_LEFT+chartW+2} y={toY(ohlcv[n-1].c)-8} width={44} height={15} rx="3" fill="#1e293b"/>
        <text x={PAD_LEFT+chartW+24} y={toY(ohlcv[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcv[n-1].c.toFixed(2)}</text>

        {/* Crosshair */}
        {hover !== null && <>
          <line x1={toX(hover)} x2={toX(hover)} y1={PAD_TOP} y2={PAD_TOP+chartH} stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
          <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={toY(ohlcv[hover].c)} y2={toY(ohlcv[hover].c)} stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
          <rect x={PAD_LEFT-48} y={toY(ohlcv[hover].c)-8} width={44} height={15} rx="3" fill="#1e293b"/>
          <text x={PAD_LEFT-26} y={toY(ohlcv[hover].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcv[hover].c.toFixed(2)}</text>
        </>}

        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      {/* Legende (ohne Pfeil-Einträge) */}
      <div style={{padding:"5px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Downmove-Hoch</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f97316" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>~BOC (nah)</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#22c55e" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Breakout ✓</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>
          {ohlcv.length} Handelstage · Daily
        </div>
      </div>
    </div>
  );
}

// ── Hilfkomponenten ────────────────────────────────────────────────────────
const WINDOWS = ["5T","10T","20T","50T","6M"];
function Cell({ v }) {
  if (v == null) return <span style={{color:"#334155"}}>—</span>;
  return <span style={{color:v>0?"#4ade80":"#f87171",fontFamily:"monospace",fontSize:10}}>{v>0?"+":""}{v}</span>;
}

// ── Haupt-App ──────────────────────────────────────────────────────────────
function App() {
  const [data, setData]     = useState(null);
  const [error, setError]   = useState(null);
  const [topN, setTopN]     = useState(10);
  const [sortBy, setSortBy] = useState("score");
  const [showAll, setShowAll] = useState(false);
  const [selected, setSelected] = useState(null);

  // JSON laden
  useEffect(() => {
    fetch("rs_full.json")
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(json => {
        setData(json);
        const first = json.data.find(d => json.top20.includes(d.ticker) && d.ohlcv?.length > 0);
        if (first) setSelected(first.ticker);
      })
      .catch(e => setError(e.message));
  }, []);

  const rsData = useMemo(() => {
    if (!data) return [];
    return data.data.map(d => ({ t: d.ticker, s: d.score, w: d.windows }));
  }, [data]);

  const sorted = useMemo(() =>
    [...rsData].sort((a,b) => sortBy === "score" ? b.s - a.s : (b.w[sortBy]??-999) - (a.w[sortBy]??-999)),
    [rsData, sortBy]);

  // Alle Zeilen anzeigen oder nur Top N+5 (mind. 15)
  const rows = showAll ? sorted : sorted.slice(0, Math.max(topN + 5, 15));

  const ohlcv = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv?.length > 0 ? entry.ohlcv : null;
  }, [data, selected]);

  const structure = useMemo(() => analyzeStructure(ohlcv), [ohlcv]);
  const selectedRs = rsData.find(d => d.t === selected);
  const top20 = data?.top20 ?? [];

  // Breakout/NearBreakout-Tickers aus allen Tickers mit OHLCV-Daten ermitteln
  const breakoutTickers = useMemo(() => {
    if (!data) return [];
    return data.data
      .filter(d => d.ohlcv?.length > 0)
      .map(d => ({ ticker: d.ticker, struct: analyzeStructure(d.ohlcv) }))
      .filter(x => x.struct?.broken || x.struct?.nearBreakout);
  }, [data]);

  const sel = {background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"};

  // Timestamp aus JSON parsen für Anzeige
  const tsDisplay = useMemo(() => {
    if (!data?.timestamp) return null;
    return data.timestamp; // Format: "2026-04-04 19:06"
  }, [data]);

  if (error) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#f87171",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:18}}>⚠ Fehler beim Laden</span>
      <span style={{fontSize:12,color:"#475569"}}>{error}</span>
      <span style={{fontSize:11,color:"#334155"}}>Stelle sicher, dass rs_full.json im selben Verzeichnis liegt.</span>
    </div>
  );

  if (!data) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#475569",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:24,animation:"spin 1s linear infinite"}}>⟳</span>
      <span style={{fontSize:12}}>Lade rs_full.json …</span>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"'Inter',system-ui,sans-serif",padding:"12px 10px",maxWidth:760,margin:"0 auto"}}>

      {/* ── Header ── */}
      <div style={{marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:4}}>
        <div>
          <h1 style={{margin:0,fontSize:17,fontWeight:800,color:"#f8fafc"}}>⚡ RS · QQQ</h1>
          <p style={{margin:"1px 0 0",color:"#475569",fontSize:10}}>Outperformance vs. Nasdaq 100 ({rsData.length} Aktien)</p>
        </div>
        {tsDisplay && (
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#334155",textTransform:"uppercase",letterSpacing:0.5}}>Letzte Aktualisierung</div>
            <div style={{fontSize:12,fontFamily:"monospace",fontWeight:700,color:"#64748b"}}>{tsDisplay}</div>
          </div>
        )}
      </div>

      {/* ── Breakout-Alert-Zeile ── */}
      {breakoutTickers.length > 0 && (
        <div style={{background:"#0a1020",borderRadius:8,border:"1px solid #1e293b",padding:"7px 10px",marginBottom:10,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:0.5,whiteSpace:"nowrap"}}>Breakouts</span>
          {breakoutTickers.map(({ticker, struct}) => {
            const hasChart = data.data.find(d=>d.ticker===ticker)?.ohlcv?.length > 0;
            const isBroken = struct.broken;
            return (
              <span key={ticker}
                onClick={() => hasChart && setSelected(ticker)}
                style={{
                  background: isBroken ? "#052e16" : "#1c1108",
                  border: `1px solid ${isBroken ? "#22c55e" : "#f97316"}`,
                  color: isBroken ? "#4ade80" : "#fb923c",
                  borderRadius:4, padding:"2px 7px", fontSize:10, fontWeight:700,
                  fontFamily:"monospace", cursor:"pointer"
                }}>
                {ticker}{isBroken ? " ✓" : " ~"}
              </span>
            );
          })}
        </div>
      )}

      {/* ── Filter-Zeile ── */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Top N</label>
          <select style={sel} value={topN} onChange={e=>setTopN(+e.target.value)}>
            {[5,10,15,20].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Sortieren</label>
          <select style={sel} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="score">Score</option>
            {WINDOWS.map(w=><option key={w} value={w}>{w}</option>)}
          </select>
        </div>
      </div>

      {/* ── RS-Tabelle (enger) ── */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginBottom:10,overflowX:"auto"}}>
        <div style={{minWidth:380}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:"18px 46px 50px repeat(5,1fr)",padding:"5px 8px",background:"#1e293b",gap:2,fontSize:8.5,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>
            <span>#</span><span>Ticker</span><span>Score</span>
            {WINDOWS.map(w=><span key={w} style={{textAlign:"center"}}>{w}</span>)}
          </div>
          {/* Zeilen */}
          {rows.map(item => {
            const rank = sorted.indexOf(item);
            const isTop = rank < topN;
            const isSelected = item.t === selected;
            const hasChart = top20.includes(item.t) && data.data.find(d=>d.ticker===item.t)?.ohlcv?.length > 0;
            return (
              <div key={item.t}
                onClick={() => hasChart && setSelected(item.t)}
                style={{
                  display:"grid",gridTemplateColumns:"18px 46px 50px repeat(5,1fr)",
                  padding:"5px 8px",gap:2,
                  borderTop:"1px solid #0a0f1e",
                  background: isSelected ? "#1a2f4a" : isTop ? (rank%2===0?"#0d1526":"#0a1020") : "#07090f",
                  opacity: isTop ? 1 : 0.25,
                  alignItems:"center",
                  cursor: hasChart ? "pointer" : "default",
                  borderLeft: isSelected ? "2px solid #3b82f6" : "2px solid transparent",
                }}>
                <span style={{fontSize:9,fontWeight:700,color:rank===0?"#f59e0b":rank<3?"#94a3b8":"#334155"}}>{rank+1}</span>
                <span style={{fontWeight:700,fontSize:10,fontFamily:"monospace",color:rank===0?"#fbbf24":isTop?"#f1f5f9":"#475569"}}>
                  {item.t}
                </span>
                <span style={{fontFamily:"monospace",fontSize:10,fontWeight:600,color:item.s>0?"#4ade80":"#f87171"}}>
                  {item.s>0?"+":""}{item.s}
                </span>
                {WINDOWS.map(w=>(
                  <div key={w} style={{textAlign:"center"}}><Cell v={item.w[w]}/></div>
                ))}
              </div>
            );
          })}
          {!showAll && sorted.length > rows.length && (
            <div style={{textAlign:"center",padding:"6px",borderTop:"1px solid #0a0f1e"}}>
              <button onClick={()=>setShowAll(true)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"3px 12px",fontSize:10,cursor:"pointer"}}>
                Alle {rsData.length} anzeigen ↓
              </button>
            </div>
          )}
        </div>
      </div>

      {/* ── Portfolio-Übersicht ── */}
      <div style={{background:"#0f172a",borderRadius:10,padding:10,border:"1px solid #1e293b",marginBottom:10}}>
        <p style={{margin:"0 0 5px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Portfolio · Top {topN}</p>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {sorted.slice(0,topN).map((d,i) => {
            const hasChart = top20.includes(d.t) && data.data.find(e=>e.ticker===d.t)?.ohlcv?.length > 0;
            return (
              <span key={d.t}
                onClick={() => hasChart && setSelected(d.t)}
                style={{
                  background:i<3?"#1a2f4a":"#1e293b",
                  border:`1px solid ${d.t===selected?"#3b82f6":i<3?"#2563eb":"#334155"}`,
                  borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:700,
                  color:i<3?"#93c5fd":"#94a3b8",fontFamily:"monospace",
                  cursor:hasChart?"pointer":"default"
                }}>{d.t}</span>
            );
          })}
        </div>
      </div>

      {/* ── Strukturanalyse ── */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:12,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p style={{margin:0,fontSize:11,fontWeight:700,color:"#f1f5f9"}}>📊 Daily Struktur · {selected ?? "–"}</p>
          {selectedRs && (
            <span style={{fontSize:11,fontFamily:"monospace",color:selectedRs.s>0?"#4ade80":"#f87171"}}>
              RS Score: {selectedRs.s>0?"+":""}{selectedRs.s}
            </span>
          )}
        </div>
        {ohlcv && structure ? (
          <>
            <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
              {/* Breakout-Status */}
              <span style={{
                background: structure.broken ? "#052e16" : structure.nearBreakout ? "#1c1108" : "#0d1526",
                border: `1px solid ${structure.broken ? "#22c55e" : structure.nearBreakout ? "#f97316" : "#334155"}`,
                color: structure.broken ? "#4ade80" : structure.nearBreakout ? "#fb923c" : "#64748b",
                borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:600
              }}>
                {structure.broken ? "✅ Downmove-Hoch gebrochen" : structure.nearBreakout ? "🔥 Kurz vor Ausbruch (~BOC)" : "⏳ Warte auf Breakout"}
              </span>
              {/* Trend */}
              <span style={{background:"#0d1526",border:"1px solid #1e3a5f",color:"#93c5fd",borderRadius:5,padding:"2px 7px",fontSize:10}}>
                Trend: {structure.trend === "bullish" ? "↗ Bullish" : structure.trend === "bearish" ? "↘ Bearish" : "→ Neutral"}
              </span>
              {/* Setup-Badge */}
              {structure.setup && (
                <span style={{background:"#1a2f4a",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:600}}>
                  ⚡ Setup aktiv → 4H Entry
                </span>
              )}
            </div>
            {/* Preis-Details */}
            {structure.lastDownmoveHigh && (
              <div style={{marginBottom:10,padding:"6px 10px",background:"#07090f",borderRadius:6,border:"1px solid #1a2235",display:"flex",gap:12,flexWrap:"wrap",fontSize:10}}>
                <span>
                  <span style={{color:"#475569"}}>Downmove-Hoch </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:structure.broken?"#4ade80":structure.nearBreakout?"#f97316":"#f59e0b"}}>
                    ${structure.lastDownmoveHigh.price.toFixed(2)}
                  </span>
                  <span style={{color:"#334155",marginLeft:4,fontSize:9}}>({structure.lastDownmoveHigh.date})</span>
                </span>
                <span>
                  <span style={{color:"#475569"}}>Aktuell </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:"#f1f5f9"}}>${structure.currentClose.toFixed(2)}</span>
                </span>
                <span>
                  <span style={{color:"#475569"}}>Abstand </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:structure.broken?"#4ade80":structure.nearBreakout?"#f97316":"#f59e0b"}}>
                    {structure.broken ? "+" : ""}{((structure.currentClose / structure.lastDownmoveHigh.price - 1)*100).toFixed(1)}%
                  </span>
                </span>
              </div>
            )}
            <CandleChart ohlcv={ohlcv} structure={structure}/>
          </>
        ) : (
          <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>
            Klick auf einen Ticker mit Chart-Daten für Strukturanalyse.
          </div>
        )}
      </div>

      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:6}}>
        Echte Daten via yfinance · Kein Handelssignal · Stand {data.timestamp}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
