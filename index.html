<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS · QQQ Dashboard</title>
  <!-- Daten aus data.json · index.html + data.json müssen im gleichen Ordner sein -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select, button { outline: none; }
    .chart-wrap { position: relative; }
    .chart-wrap svg { display: block; }
  </style>
</head>
<body>
<div id="root"></div>


<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;

// → Daten werden in App() aus data.json geladen


function analyzeStructure(ohlcv) {
  if (!ohlcv || ohlcv.length < 10) return null;
  const n = ohlcv.length;
  const highs = ohlcv.map(d => d.h);
  const lows = ohlcv.map(d => d.l);
  const closes = ohlcv.map(d => d.c);
  const swingHighs = [];
  for (let i = 2; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] && highs[i] >= highs[i+1] && highs[i] >= highs[i+2]) {
      swingHighs.push({ idx: i, date: ohlcv[i].d, price: highs[i] });
    }
  }
  const swingLows = [];
  for (let i = 2; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] && lows[i] <= lows[i+1] && lows[i] <= lows[i+2]) {
      swingLows.push({ idx: i, date: ohlcv[i].d, price: lows[i] });
    }
  }
  const currentClose = closes[n - 1];
  // Letztes Downmove-Hoch: Swing-Hoch nach dem danach mind. 5% Rückgang kam
  let lastDownmoveHigh = null;
  for (let i = swingHighs.length - 1; i >= 0; i--) {
    const sh = swingHighs[i];
    const subsLows = lows.slice(sh.idx + 1);
    if (subsLows.length === 0) continue;
    const minAfter = Math.min(...subsLows);
    if (minAfter < sh.price * 0.95) { lastDownmoveHigh = sh; break; }
  }
  // Retracement-Hoch: höchstes Hoch nach dem tiefsten Punkt nach dem Downmove-Hoch
  let retracementHigh = null;
  if (lastDownmoveHigh) {
    let minLowVal = Infinity, minLowIdx = lastDownmoveHigh.idx;
    for (let i = lastDownmoveHigh.idx + 1; i < n; i++) {
      if (lows[i] < minLowVal) { minLowVal = lows[i]; minLowIdx = i; }
    }
    let maxHighVal = -Infinity, maxHighIdx = -1;
    for (let i = minLowIdx + 1; i < n - 1; i++) {
      if (highs[i] > maxHighVal) { maxHighVal = highs[i]; maxHighIdx = i; }
    }
    if (maxHighIdx > minLowIdx && maxHighVal > minLowVal * 1.02) {
      retracementHigh = { idx: maxHighIdx, date: ohlcv[maxHighIdx].d, price: maxHighVal };
    }
  }
  const broken = !!(lastDownmoveHigh && currentClose > lastDownmoveHigh.price);
  const retracementBroken = !!(retracementHigh && currentClose > retracementHigh.price);
  let trend = "neutral";
  if (swingHighs.length >= 2) {
    const last = swingHighs[swingHighs.length - 1];
    const prev = swingHighs[swingHighs.length - 2];
    if (last.price > prev.price) trend = "bullish";
    else if (last.price < prev.price) trend = "bearish";
  }
  // Breakout-Index
  let breakoutIdx = null;
  if (lastDownmoveHigh) {
    for (let i = lastDownmoveHigh.idx + 1; i < n; i++) {
      if (ohlcv[i].c > lastDownmoveHigh.price) { breakoutIdx = i; break; }
    }
  }
  return { currentClose, lastDownmoveHigh, broken, retracementHigh, retracementBroken,
    trend, swingHighs: swingHighs.slice(-6), swingLows: swingLows.slice(-6),
    setup: broken && retracementHigh && !retracementBroken, breakoutIdx };
}

// ── Professioneller Chart ──────────────────────────────────────────────────
function CandleChart({ ohlcv, structure }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);

  // Layout-Konstanten
  const W = 600, H = 260;
  const PAD_LEFT = 52, PAD_RIGHT = 48, PAD_TOP = 18, PAD_BOTTOM = 32;
  const chartW = W - PAD_LEFT - PAD_RIGHT;
  const chartH = H - PAD_TOP - PAD_BOTTOM;

  const n = ohlcv.length;
  const allH = ohlcv.map(d => d.h);
  const allL = ohlcv.map(d => d.l);

  // Preis-Range mit etwas Puffer
  const rawMax = Math.max(...allH);
  const rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.06;
  const maxP = rawMax + pad;
  const minP = rawMin - pad;
  const range = maxP - minP;

  const toY = p => PAD_TOP + (1 - (p - minP) / range) * chartH;
  const toX = i => PAD_LEFT + (i + 0.5) * (chartW / n);
  const barW = Math.max(2, chartW / n * 0.65);

  // Y-Achsen-Ticks (5 Stufen)
  const yTicks = [];
  const step = range / 5;
  for (let k = 0; k <= 5; k++) {
    const val = minP + k * step;
    yTicks.push(val);
  }

  // Monats-Labels für X-Achse
  const monthLabels = [];
  let lastMonth = null;
  ohlcv.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) {
      monthLabels.push({ i, label: d.d.slice(5, 7) + "/" + d.d.slice(2, 4) });
      lastMonth = m;
    }
  });

  // Breakout-Kerze finden (erste Kerze, die über das Downmove-Hoch schließt)
  let breakoutIdx = null;
  if (structure?.lastDownmoveHigh) {
    for (let i = structure.lastDownmoveHigh.idx + 1; i < n; i++) {
      if (ohlcv[i].c > structure.lastDownmoveHigh.price) {
        breakoutIdx = i;
        break;
      }
    }
  }

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const idx = Math.round((mx - PAD_LEFT) / (chartW / n) - 0.5);
    if (idx >= 0 && idx < n) setHover(idx);
    else setHover(null);
  }, [n, chartW]);

  const handleMouseLeave = () => setHover(null);

  const hd = hover !== null ? ohlcv[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      {/* Tooltip-Bar oben */}
      <div style={{
        height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,
        background:"#0a0f1e",borderBottom:"1px solid #1e293b",
        fontSize:10,fontFamily:"monospace",
        transition:"all 0.1s"
      }}>
        {hd ? (
          <>
            <span style={{color:"#475569"}}>{hd.d}</span>
            <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
            <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
            <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
            <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
            <span style={{color:"#475569",marginLeft:"auto"}}>
              {hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%
            </span>
          </>
        ) : (
          <span style={{color:"#334155"}}>Hover für OHLC-Details</span>
        )}
      </div>

      <svg
        ref={svgRef}
        width="100%"
        viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove}
        onMouseLeave={handleMouseLeave}
        style={{cursor:"crosshair"}}
      >
        <defs>
          {/* Breakout-Zone Gradient */}
          <linearGradient id="breakoutGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#22c55e" stopOpacity="0.12"/>
            <stop offset="100%" stopColor="#22c55e" stopOpacity="0.01"/>
          </linearGradient>
          {/* Downmove-Zone Gradient */}
          <linearGradient id="downGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.06"/>
            <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0"/>
          </linearGradient>
        </defs>

        {/* Hintergrund */}
        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="#07090f"/>

        {/* Y-Gridlines + Labels */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return (
            <g key={k}>
              <line x1={PAD_LEFT} x2={PAD_LEFT + chartW} y1={y} y2={y}
                stroke="#1a2235" strokeWidth="0.8"/>
              <text x={PAD_LEFT - 5} y={y + 3.5} textAnchor="end"
                fill="#334155" fontSize="9" fontFamily="monospace">
                {val.toFixed(0)}
              </text>
            </g>
          );
        })}

        {/* X-Achsen Monats-Labels */}
        {monthLabels.map(({ i, label }) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PAD_TOP} y2={PAD_TOP + chartH}
              stroke="#131c2e" strokeWidth="1" strokeDasharray="2,4"/>
            <text x={toX(i)} y={PAD_TOP + chartH + 14} textAnchor="middle"
              fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Downmove-Zone: Hintergrund-Schattierung vor dem Breakout */}
        {structure?.lastDownmoveHigh && breakoutIdx !== null && (
          <rect
            x={PAD_LEFT}
            y={PAD_TOP}
            width={toX(breakoutIdx) - PAD_LEFT}
            height={chartH}
            fill="url(#downGrad)"
          />
        )}

        {/* Breakout-Zone: ab der Breakout-Kerze */}
        {breakoutIdx !== null && (
          <rect
            x={toX(breakoutIdx) - barW}
            y={PAD_TOP}
            width={chartW - (toX(breakoutIdx) - PAD_LEFT) + barW}
            height={chartH}
            fill="url(#breakoutGrad)"
          />
        )}

        {/* Downmove-Hoch Linie */}
        {structure?.lastDownmoveHigh && (() => {
          const y = toY(structure.lastDownmoveHigh.price);
          const color = structure.broken ? "#22c55e" : "#f59e0b";
          return (
            <>
              {/* Schattenbereich unterhalb der Linie */}
              <rect x={PAD_LEFT} y={y} width={chartW} height={PAD_TOP+chartH-y}
                fill={color} opacity="0.03"/>
              {/* Hauptlinie */}
              <line x1={PAD_LEFT} x2={PAD_LEFT + chartW} y1={y} y2={y}
                stroke={color} strokeWidth="1.5" strokeDasharray="5,4"/>
              {/* Label links */}
              <rect x={PAD_LEFT - 48} y={y - 9} width={44} height={16}
                rx="3" fill="#0a0f1e" stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT - 26} y={y + 4} textAnchor="middle"
                fill={color} fontSize="9" fontWeight="700" fontFamily="monospace">
                {structure.lastDownmoveHigh.price.toFixed(1)}
              </text>
              {/* Label rechts */}
              <rect x={PAD_LEFT + chartW + 2} y={y - 9} width={44} height={16}
                rx="3" fill={color + "22"} stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT + chartW + 24} y={y + 4} textAnchor="middle"
                fill={color} fontSize="8" fontWeight="700" fontFamily="monospace">
                {structure.broken ? "✓ BOC" : "Res."}
              </text>
            </>
          );
        })()}

        {/* Retracement-Hoch Linie (violett) - Entry-Level */}
        {structure?.retracementHigh && (() => {
          const rtH = structure.retracementHigh;
          const y = toY(rtH.price);
          const col = structure.retracementBroken ? "#22c55e" : "#8b5cf6";
          return <>
            <line x1={toX(rtH.idx)} x2={PAD_LEFT+chartW} y1={y} y2={y} stroke={col} strokeWidth="1.5" strokeDasharray="3,3"/>
            <polygon points={`${toX(rtH.idx)},${y-10} ${toX(rtH.idx)-4},${y-4} ${toX(rtH.idx)+4},${y-4}`} fill={col} opacity="0.9"/>
            <rect x={PAD_LEFT+chartW+2} y={y-9} width={44} height={16} rx="3" fill={col+"33"} stroke={col} strokeWidth="0.8"/>
            <text x={PAD_LEFT+chartW+24} y={y+4} textAnchor="middle" fill={col} fontSize="8" fontWeight="700" fontFamily="monospace">
              {structure.retracementBroken ? "✓ ENT" : "▶ ENT"}
            </text>
          </>;
        })()}
        {/* Swing-Hoch Marker */}
        {structure?.swingHighs?.map((sh, k) => {
          const x = toX(sh.idx);
          const y = toY(sh.price);
          const isDownHigh = structure.lastDownmoveHigh && sh.idx === structure.lastDownmoveHigh.idx;
          if (isDownHigh) return null;
          return (
            <g key={k}>
              <polygon points={`${x},${y-10} ${x-4},${y-4} ${x+4},${y-4}`}
                fill="#f59e0b" opacity="0.7"/>
            </g>
          );
        })}

        {/* Swing-Tief Marker */}
        {structure?.swingLows?.map((sl, k) => {
          const x = toX(sl.idx);
          const y = toY(sl.price);
          return (
            <g key={k}>
              <polygon points={`${x},${y+10} ${x-4},${y+4} ${x+4},${y+4}`}
                fill="#3b82f6" opacity="0.5"/>
            </g>
          );
        })}

        {/* Breakout-Kerze Highlight */}
        {breakoutIdx !== null && (() => {
          const x = toX(breakoutIdx);
          return (
            <rect
              x={x - barW * 0.8}
              y={PAD_TOP}
              width={barW * 1.6}
              height={chartH}
              fill="#22c55e"
              opacity="0.07"
              rx="1"
            />
          );
        })()}

        {/* Kerzen */}
        {ohlcv.map((d, i) => {
          const x = toX(i);
          const bullish = d.c >= d.o;
          const isBreakout = i === breakoutIdx;
          const color = bullish ? "#22c55e" : "#ef4444";
          const bodyTop = toY(Math.max(d.o, d.c));
          const bodyBot = toY(Math.min(d.o, d.c));
          const bodyH = Math.max(1.5, bodyBot - bodyTop);
          const isHovered = hover === i;
          return (
            <g key={i}>
              {/* Docht */}
              <line x1={x} x2={x} y1={toY(d.h)} y2={toY(d.l)}
                stroke={color} strokeWidth={isHovered ? 1.5 : 1} opacity={isBreakout ? 1 : 0.9}/>
              {/* Körper */}
              <rect
                x={x - barW / 2}
                y={bodyTop}
                width={barW}
                height={bodyH}
                fill={color}
                opacity={isBreakout ? 1 : isHovered ? 0.95 : 0.8}
                stroke={isBreakout ? "#fff" : isHovered ? color : "none"}
                strokeWidth={isBreakout ? 0.5 : 0}
              />
            </g>
          );
        })}

        {/* Letzter Kurs Linie */}
        <line
          x1={PAD_LEFT} x2={PAD_LEFT + chartW}
          y1={toY(ohlcv[n-1].c)} y2={toY(ohlcv[n-1].c)}
          stroke="#94a3b8" strokeWidth="0.6" strokeDasharray="2,3" opacity="0.4"
        />
        <rect x={PAD_LEFT + chartW + 2} y={toY(ohlcv[n-1].c) - 8} width={44} height={15}
          rx="3" fill="#1e293b"/>
        <text x={PAD_LEFT + chartW + 24} y={toY(ohlcv[n-1].c) + 3} textAnchor="middle"
          fill="#94a3b8" fontSize="8.5" fontFamily="monospace">
          {ohlcv[n-1].c.toFixed(2)}
        </text>

        {/* Hover-Crosshair */}
        {hover !== null && (
          <>
            <line x1={toX(hover)} x2={toX(hover)} y1={PAD_TOP} y2={PAD_TOP+chartH}
              stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
            <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={toY(ohlcv[hover].c)} y2={toY(ohlcv[hover].c)}
              stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
            {/* Preismarker Crosshair */}
            <rect x={PAD_LEFT - 48} y={toY(ohlcv[hover].c) - 8} width={44} height={15}
              rx="3" fill="#1e293b"/>
            <text x={PAD_LEFT - 26} y={toY(ohlcv[hover].c) + 3} textAnchor="middle"
              fill="#94a3b8" fontSize="8.5" fontFamily="monospace">
              {ohlcv[hover].c.toFixed(2)}
            </text>
          </>
        )}

        {/* Chart-Rahmen */}
        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH}
          fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      {/* Legende unten */}
      <div style={{
        padding:"6px 12px",display:"flex",gap:14,alignItems:"center",
        background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Downmove-Hoch</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#22c55e" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Breakout ✓</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#8b5cf6" strokeWidth="1.5" strokeDasharray="3,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Retracement-Hoch (Entry)
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="10" height="10"><polygon points="5,0 0,8 10,8" fill="#f59e0b" opacity="0.7"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Swing-Hoch</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="10" height="10"><polygon points="5,10 0,2 10,2" fill="#3b82f6" opacity="0.5"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Swing-Tief</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>
          {n} Handelstage · Daily
        </div>
      </div>
    </div>
  );
}

const WINDOWS = ["5T","10T","20T","50T","6M"];

function Cell({ v }) {
  if (v == null) return <span style={{color:"#334155"}}>—</span>;
  return <span style={{color:v>0?"#4ade80":"#f87171",fontFamily:"monospace",fontSize:11}}>{v>0?"+":""}{v}</span>;
}

function App() {
  // ── Daten aus data.json laden ──
  const [appData, setAppData] = React.useState(null);
  React.useEffect(() => {
    fetch("data.json")
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => setAppData(d))
      .catch(() => setAppData("error"));
  }, []);

  if (!appData) return (
    <div style={{color:"#94a3b8",fontFamily:"monospace",padding:"60px 20px",textAlign:"center",background:"#060b14",minHeight:"100vh"}}>
      <div style={{fontSize:32,marginBottom:16}}>⏳</div>
      <div>Lade data.json...</div>
    </div>
  );
  if (appData === "error") return (
    <div style={{color:"#f87171",fontFamily:"monospace",padding:"20px",background:"#0f172a",borderRadius:"8px",margin:"20px",border:"1px solid #f87171",fontSize:13}}>
      ⚠️ <strong>data.json nicht gefunden.</strong><br/>
      Beide Dateien müssen im gleichen Ordner liegen:<br/>
      <code style={{color:"#94a3b8"}}>index.html</code> und <code style={{color:"#94a3b8"}}>data.json</code>
    </div>
  );

  const TIMESTAMP = appData.timestamp;
  const TOP20 = appData.top20;
  const RS_DATA = appData.rs_data;
  const OHLCV_MAP = appData.ohlcv_map;
  const ARM_OHLCV = OHLCV_MAP["ARM"] || [];
  const [topN, setTopN] = useState(10);
  const [sortBy, setSortBy] = useState("score");
  const [showAll, setShowAll] = useState(false);
  const [selected, setSelected] = useState("ARM");

  const sorted = useMemo(() =>
    [...RS_DATA].sort((a,b) => sortBy === "score" ? b.s - a.s : (b.w[sortBy]??-999) - (a.w[sortBy]??-999)),
    [sortBy]);

  const rows = showAll ? sorted : sorted.slice(0, Math.max(topN+5, 15));

  const selectedData = RS_DATA.find(d => d.t === selected);
  const ohlcv = OHLCV_MAP[selected] || null;
  const structure = useMemo(() => analyzeStructure(ohlcv), [ohlcv]);


  // Status für Icon-Anzeige
  const getTickerStatus = (ticker) => {
    const ov = OHLCV_MAP[ticker];
    if (!ov) return null;
    const s = analyzeStructure(ov);
    if (!s || !s.lastDownmoveHigh) return null;
    if (s.broken) return s.retracementHigh && !s.retracementBroken ? "entry" : "broken";
    const abstand = (s.lastDownmoveHigh.price - s.currentClose) / s.currentClose * 100;
    return abstand < 8 ? "hot" : "pre";
  };

  const sel = {background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"};

  return (
    <div style={{minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"'Inter',system-ui,sans-serif",padding:"16px 12px"}}>
      <div style={{marginBottom:14}}>
        <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#f8fafc"}}>⚡ RS · QQQ</h1>
        <p style={{margin:"2px 0 0",color:"#475569",fontSize:11}}>Outperformance vs. Nasdaq 100 · {TIMESTAMP} · {RS_DATA.length} Ticker</p>
      </div>

      
      {/* Icon-Legende */}
      <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:8,padding:"7px 12px",marginBottom:12,fontSize:10,color:"#64748b",display:"flex",gap:18,flexWrap:"wrap"}}>
        <span>🔥 = Downmove-Hoch gebrochen, Kurs steigt</span>
        <span>⚡ = Gebrochen + Entry-Signal noch ausstehend</span>
        <span>⏳ = Vor dem Ausbruch (gelbe Linie noch nicht durchbrochen)</span>
        <span style={{color:"#334155"}}>▸ = Chart verfügbar</span>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Top N</label>
          <select style={sel} value={topN} onChange={e=>setTopN(+e.target.value)}>
            {[5,10,15,20].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Sortieren</label>
          <select style={sel} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="score">Score</option>
            {WINDOWS.map(w=><option key={w} value={w}>{w}</option>)}
          </select>
        </div>
      </div>

      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginBottom:12,overflowX:"auto"}}>
        <div style={{minWidth:440}}>
          <div style={{display:"grid",gridTemplateColumns:"22px 50px 56px repeat(5,1fr)",padding:"6px 10px",background:"#1e293b",gap:3,fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>
            <span>#</span><span>Ticker</span><span>Score</span>
            {WINDOWS.map(w=><span key={w} style={{textAlign:"center"}}>{w}</span>)}
          </div>
          {rows.map(item => {
            const rank = sorted.indexOf(item);
            const isTop = rank < topN;
            const isSelected = item.t === selected;
            return (
              <div key={item.t}
                onClick={() => OHLCV_MAP[item.t] && setSelected(item.t)}
                style={{
                  display:"grid",gridTemplateColumns:"22px 50px 56px repeat(5,1fr)",
                  padding:"6px 10px",gap:3,
                  borderTop:"1px solid #0a0f1e",
                  background: isSelected ? "#1a2f4a" : isTop ? (rank%2===0?"#0d1526":"#0a1020") : "#07090f",
                  opacity: isTop?1:0.25,
                  alignItems:"center",
                  cursor: OHLCV_MAP[item.t] ? "pointer" : "default",
                  borderLeft: isSelected ? "2px solid #3b82f6" : "2px solid transparent",
                }}>
                <span style={{fontSize:10,fontWeight:700,color:rank===0?"#f59e0b":rank<3?"#94a3b8":"#334155"}}>{rank+1}</span>
                <span style={{fontWeight:700,fontSize:11,fontFamily:"monospace",color:rank===0?"#fbbf24":isTop?"#f1f5f9":"#475569"}}>
                  {item.t}
                  {OHLCV_MAP[item.t] && <span style={{fontSize:8,color:"#334155",marginLeft:2}}>▸</span>}
                  {(()=>{const st=getTickerStatus(item.t);return st==="broken"?<span style={{fontSize:9}}>🔥</span>:st==="entry"?<span style={{fontSize:9}}>⚡</span>:st==="hot"?<span style={{fontSize:9}}>⏳</span>:st==="pre"?<span style={{fontSize:9}}>⏳</span>:null;})()}
                </span>
                <span style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color:item.s>0?"#4ade80":"#f87171"}}>
                  {item.s>0?"+":""}{item.s}
                </span>
                {WINDOWS.map(w=>(
                  <div key={w} style={{textAlign:"center"}}><Cell v={item.w[w]}/></div>
                ))}
              </div>
            );
          })}
          {!showAll && sorted.length > rows.length && (
            <div style={{textAlign:"center",padding:"8px",borderTop:"1px solid #0a0f1e"}}>
              <button onClick={()=>setShowAll(true)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                Alle {RS_DATA.length} ↓
              </button>
            </div>
          )}
        </div>
      </div>

      <div style={{background:"#0f172a",borderRadius:10,padding:12,border:"1px solid #1e293b",marginBottom:12}}>
        <p style={{margin:"0 0 6px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Portfolio · Top {topN}</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {sorted.slice(0,topN).map((d,i)=>(
            <span key={d.t}
              onClick={() => OHLCV_MAP[d.t] && setSelected(d.t)}
              style={{
                background:i<3?"#1a2f4a":"#1e293b",
                border:`1px solid ${d.t===selected?"#3b82f6":i<3?"#2563eb":"#334155"}`,
                borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,
                color:i<3?"#93c5fd":"#94a3b8",fontFamily:"monospace",
                cursor:OHLCV_MAP[d.t]?"pointer":"default"
              }}>{d.t}</span>
          ))}
        </div>
      </div>

      {/* Struktur-Panel */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:11,fontWeight:700,color:"#f1f5f9"}}>📊 Daily Struktur · {selected}</p>
          {selectedData && (
            <span style={{fontSize:11,fontFamily:"monospace",color:selectedData.s>0?"#4ade80":"#f87171"}}>
              RS Score: {selectedData.s>0?"+":""}{selectedData.s}
            </span>
          )}
        </div>
        {ohlcv && structure ? (
          <>
            {/* Status-Badges */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{
                background: structure.broken ? "#052e16" : "#1c1108",
                border: `1px solid ${structure.broken ? "#22c55e" : "#f59e0b"}`,
                color: structure.broken ? "#4ade80" : "#fbbf24",
                borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600
              }}>
                {structure.broken ? "✅ Downmove-Hoch gebrochen" : "⏳ Warte auf Breakout"}
              </span>
              <span style={{background:"#0d1526",border:"1px solid #1e3a5f",color:"#93c5fd",borderRadius:5,padding:"3px 8px",fontSize:11}}>
                Trend: {structure.trend === "bullish" ? "↗ Bullish" : structure.trend === "bearish" ? "↘ Bearish" : "→ Neutral"}
              </span>
              {structure.setup && (
                <span style={{background:"#1a2f4a",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600}}>
                  ⚡ Setup aktiv → 4H Entry
                </span>
              )}
            </div>

            {/* Key Levels */}
            {structure.lastDownmoveHigh && (
              <div style={{
                marginBottom:12,padding:"7px 10px",
                background:"#07090f",borderRadius:6,border:"1px solid #1a2235",
                display:"flex",gap:16,flexWrap:"wrap",fontSize:11
              }}>
                <span>
                  <span style={{color:"#475569"}}>Downmove-Hoch </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:structure.broken?"#4ade80":"#f59e0b"}}>
                    ${structure.lastDownmoveHigh.price.toFixed(2)}
                  </span>
                  <span style={{color:"#334155",marginLeft:5,fontSize:10}}>({structure.lastDownmoveHigh.date})</span>
                </span>
                <span>
                  <span style={{color:"#475569"}}>Aktuell </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:"#f1f5f9"}}>${structure.currentClose.toFixed(2)}</span>
                </span>
                {structure.broken && (
                  <span>
                    <span style={{color:"#475569"}}>Abstand </span>
                    <span style={{fontFamily:"monospace",fontWeight:700,color:"#4ade80"}}>
                      +{((structure.currentClose / structure.lastDownmoveHigh.price - 1)*100).toFixed(1)}%
                    </span>
                  </span>
                )}
              </div>
            )}

            {/* Professioneller Chart */}
            <CandleChart ohlcv={ohlcv} structure={structure}/>

            {/* Setup-Notiz dynamisch */}
            {structure && (
              <div style={{marginTop:10,padding:"8px 10px",background:"#0d1526",borderRadius:6,border:"1px solid #1e3a5f",fontSize:11,color:"#93c5fd",lineHeight:1.6}}>
                <strong>{selected} Status:</strong>{" "}
                {structure.broken
                  ? structure.retracementHigh && !structure.retracementBroken
                    ? <>🔥 Downmove-Hoch gebrochen. Kurs läuft im Retracement. <strong>Entry wenn ${structure.retracementHigh.price >= 100 ? structure.retracementHigh.price.toFixed(0) : structure.retracementHigh.price.toFixed(2)} (violette Linie) per Tagesschluss überschritten wird.</strong> Noch {((structure.retracementHigh.price - structure.currentClose)/structure.currentClose*100).toFixed(1)}% entfernt.</>
                    : <>✅ Downmove-Hoch gebrochen und Retracement-Hoch überwunden. Aktiver Aufwärtstrend.</>
                  : structure.lastDownmoveHigh
                    ? <>⏳ Vor dem Ausbruch. Widerstand bei ${structure.lastDownmoveHigh.price >= 100 ? structure.lastDownmoveHigh.price.toFixed(0) : structure.lastDownmoveHigh.price.toFixed(2)} (gelbe Linie). Noch {((structure.lastDownmoveHigh.price - structure.currentClose)/structure.currentClose*100).toFixed(1)}% bis Breakout-Level. Kein Setup solange dieses Hoch nicht per Tagesschluss gebrochen ist.</>
                    : <>Keine klare Struktur erkennbar.</>
                }
              </div>
            )}
          </>
        ) : (
          <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>
            Klick auf einen Top-20 Ticker (▸) für Strukturanalyse.<br/>
            <span style={{fontSize:10,marginTop:4,display:"block"}}>Aktuell nur für ARM verfügbar (OHLCV-Daten geladen)</span>
          </div>
        )}
      </div>

      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:8}}>
        Echte Daten via yfinance · Kein Handelssignal · Stand {TIMESTAMP}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
