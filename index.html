<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS · QQQ Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select, button { outline: none; }
    .chart-wrap { position: relative; }
    .chart-wrap svg { display: block; }
    @keyframes redGlow { 0%,100%{box-shadow:0 0 6px #ef444455} 50%{box-shadow:0 0 16px #ef4444aa} }
    .red-glow { animation: redGlow 1.3s ease-in-out infinite; }
    @keyframes flamePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.75;transform:scale(1.2)} }
    .flame-anim { display:inline-block; animation: flamePulse 0.9s ease-in-out infinite; }
    .charts-grid { display:flex; flex-direction:column; gap:10px; }
    @media (min-width:768px) {
      .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
      .chart-full-width { grid-column:1/-1; }
    }
    @media (min-width:1100px) {
      .desktop-layout { display:flex; flex-direction:row; align-items:flex-start; gap:16px; }
      .desktop-left { width:560px; flex-shrink:0; }
      .desktop-right { flex:1; min-width:0; position:sticky; top:16px; align-self:flex-start; }
    }
    .nav-bar { display:inline-flex; align-items:center; gap:5px; padding:12px 12px 0; }
    .nav-switch { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #334155; border-radius:8px; padding:6px 13px; font-size:12px; font-weight:700; color:#94a3b8; text-decoration:none; font-family:monospace; white-space:nowrap; box-shadow:0 2px 8px #00000066; transition:border-color .15s, color .15s; }
    .nav-switch:hover { border-color:#3b82f6; color:#e2e8f0; }
    .nav-switch.active { border-color:#3b82f6; color:#e2e8f0; background:#1a2f4a; }
  </style>
</head>
