<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS · QQQ Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select, button { outline: none; }
    .chart-wrap { position: relative; }
    .chart-wrap svg { display: block; }
    @keyframes redGlow { 0%,100%{box-shadow:0 0 6px #ef444455} 50%{box-shadow:0 0 16px #ef4444aa} }
    .red-glow { animation: redGlow 1.3s ease-in-out infinite; }
    @keyframes flamePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.75;transform:scale(1.2)} }
    .flame-anim { display:inline-block; animation: flamePulse 0.9s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useCallback, useEffect } = React;

// ── GWS-D Analyse (überarbeitet) ──────────────────────────────────────────
// Bullish = Close über letztem Hoch des Down-Retracements (das letzte höhere Hoch
//           vor dem darauffolgenden tieferen Tief), ODER letztem Daily-Hoch (höheres Hoch).
// Bearish = Close unter letztem Tief.
function analyzeStructure(ohlcv) {
  if (!ohlcv || ohlcv.length < 10) return null;
  const n      = ohlcv.length;
  const highs  = ohlcv.map(d => d.h);
  const lows   = ohlcv.map(d => d.l);
  const closes = ohlcv.map(d => d.c);

  // Swing-Hochs (±2 Bars)
  const swingHighs = [];
  for (let i = 2; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] &&
        highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcv[i].d, price: highs[i] });
  }

  // Swing-Tiefs (±2 Bars)
  const swingLows = [];
  for (let i = 2; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] &&
        lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcv[i].d, price: lows[i] });
  }

  // GWS-D Kandidaten: Swing-Hochs nach denen mind. -3% folgte (down retracement)
  // Das GWS-D ist das letzte Hoch VOR dem tieferen Tief — also das letzte höhere Hoch
  // des Retracements, das dann unterschritten wurde.
  const gwsdCandidates = [];
  for (let i = 0; i < swingHighs.length; i++) {
    const sh = swingHighs[i];
    if (sh.idx + 1 >= n) continue;
    const minAfter = Math.min(...lows.slice(sh.idx + 1));
    if (minAfter < sh.price * 0.97) gwsdCandidates.push(sh);
  }

  // Aktueller GWS-D: letzter Kandidat
  const gwsdHigh = gwsdCandidates.length > 0 ? gwsdCandidates[gwsdCandidates.length - 1] : null;

  // Vorheriger GWS-D: vorletzter Kandidat
  const prevGwsdHigh = gwsdCandidates.length > 1 ? gwsdCandidates[gwsdCandidates.length - 2] : null;

  // Letztes Tief nach dem aktuellen GWS-D Hoch (Bearish-Level)
  let lastLowAfterGwsd = null;
  if (gwsdHigh) {
    // Letztes Swing-Tief nach gwsdHigh.idx
    const lowsAfter = swingLows.filter(sl => sl.idx > gwsdHigh.idx);
    if (lowsAfter.length > 0) {
      lastLowAfterGwsd = lowsAfter[lowsAfter.length - 1];
    } else {
      // Fallback: absolutes Tief nach gwsdHigh
      let minIdx = gwsdHigh.idx + 1, minVal = lows[minIdx];
      for (let i = gwsdHigh.idx + 2; i < n; i++) {
        if (lows[i] < minVal) { minVal = lows[i]; minIdx = i; }
      }
      lastLowAfterGwsd = { idx: minIdx, date: ohlcv[minIdx].d, price: minVal };
    }
  }

  // Breakout des aktuellen GWS-D:
  // Bullish = erster Close über gwsdHigh.price (letztes Hoch des Down-Retracements)
  // ODER erster Close über einem späteren Swing-Hoch (höheres Hoch = direktes Bullish-Signal)
  let breakoutIdx = null;
  let breakoutPrice = null;
  if (gwsdHigh) {
    // Suche nach dem letzten Swing-Hoch nach gwsdHigh.idx (höheres Hoch im Retracement)
    const laterSwingHighs = swingHighs.filter(sh => sh.idx > gwsdHigh.idx);
    // Das relevante Breakout-Level ist das gwsdHigh ODER das letzte Swing-Hoch davor
    // (das "letzte Hoch des Down Retracements")
    let targetLevel = gwsdHigh.price;
    // Falls es nach gwsdHigh noch ein höheres Hoch gab (was das Retracement-Ende markiert),
    // dann ist DIESES das relevante Level
    if (laterSwingHighs.length > 0) {
      // Letztes Swing-Hoch das NACH gwsdHigh aber VOR dem letzten Tief liegt
      const lastLowIdx = lastLowAfterGwsd ? lastLowAfterGwsd.idx : n - 1;
      const highsBeforeLow = laterSwingHighs.filter(sh => sh.idx < lastLowIdx);
      if (highsBeforeLow.length > 0) {
        const lastHighBeforeLow = highsBeforeLow[highsBeforeLow.length - 1];
        targetLevel = lastHighBeforeLow.price;
      }
    }
    breakoutPrice = targetLevel;
    for (let i = gwsdHigh.idx + 1; i < n; i++) {
      if (closes[i] > targetLevel) { breakoutIdx = i; break; }
    }
  }

  // Vorheriger Breakout
  let prevBreakoutIdx = null;
  if (prevGwsdHigh) {
    for (let i = prevGwsdHigh.idx + 1; i < n; i++) {
      if (closes[i] > prevGwsdHigh.price) { prevBreakoutIdx = i; break; }
    }
  }

  const broken = breakoutIdx !== null;
  const currentClose = closes[n - 1];

  // Bearish: Close unter letztem Tief nach GWS-D
  const bearish = lastLowAfterGwsd && currentClose < lastLowAfterGwsd.price;

  // Trend aus letzten 2 Swing-Hochs
  let trend = "neutral";
  if (swingHighs.length >= 2) {
    const last = swingHighs[swingHighs.length - 1];
    const prev = swingHighs[swingHighs.length - 2];
    if (last.price > prev.price) trend = "bullish";
    else if (last.price < prev.price) trend = "bearish";
  }

  // Kürzlicher Breach: Breakout innerhalb der letzten 10 Kerzen oder noch aktiv
  const recentBreakout = broken && (n - 1 - breakoutIdx <= 10);

  return {
    currentClose, gwsdHigh, breakoutIdx, breakoutPrice, broken, trend,
    prevGwsdHigh, prevBreakoutIdx,
    lastLowAfterGwsd, bearish, recentBreakout,
    swingHighs: swingHighs.slice(-6),
    swingLows:  swingLows.slice(-6),
    setup: broken && trend !== "bearish",
  };
}

// ── GWS-W Analyse (Weekly) ─────────────────────────────────────────────────
function analyzeWeeklyStructure(ohlcvW) {
  if (!ohlcvW || ohlcvW.length < 8) return null;
  const n      = ohlcvW.length;
  const highs  = ohlcvW.map(d => d.h);
  const lows   = ohlcvW.map(d => d.l);
  const closes = ohlcvW.map(d => d.c);

  const swingHighs = [];
  for (let i = 2; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] &&
        highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcvW[i].d, price: highs[i] });
  }

  const swingLows = [];
  for (let i = 2; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] &&
        lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcvW[i].d, price: lows[i] });
  }

  // GWS-W: Swing-Hochs nach denen mind. -4% folgte
  const gwswCandidates = [];
  for (let i = 0; i < swingHighs.length; i++) {
    const sh = swingHighs[i];
    if (sh.idx + 1 >= n) continue;
    const minAfter = Math.min(...lows.slice(sh.idx + 1));
    if (minAfter < sh.price * 0.96) gwswCandidates.push(sh);
  }

  const gwswHigh     = gwswCandidates.length > 0 ? gwswCandidates[gwswCandidates.length - 1] : null;
  const prevGwswHigh = gwswCandidates.length > 1 ? gwswCandidates[gwswCandidates.length - 2] : null;

  // Breakout-Level: letztes Hoch des Retracements nach gwswHigh
  let breakoutPrice = gwswHigh ? gwswHigh.price : null;
  let breakoutIdx = null;
  if (gwswHigh) {
    const lastLowIdx = swingLows.filter(sl => sl.idx > gwswHigh.idx).slice(-1)[0]?.idx ?? n - 1;
    const highsBeforeLow = swingHighs.filter(sh => sh.idx > gwswHigh.idx && sh.idx < lastLowIdx);
    if (highsBeforeLow.length > 0) {
      breakoutPrice = highsBeforeLow[highsBeforeLow.length - 1].price;
    }
    for (let i = gwswHigh.idx + 1; i < n; i++) {
      if (closes[i] > breakoutPrice) { breakoutIdx = i; break; }
    }
  }

  let prevBreakoutIdx = null;
  if (prevGwswHigh) {
    for (let i = prevGwswHigh.idx + 1; i < n; i++) {
      if (closes[i] > prevGwswHigh.price) { prevBreakoutIdx = i; break; }
    }
  }

  return {
    gwswHigh, breakoutIdx, breakoutPrice, broken: breakoutIdx !== null,
    prevGwswHigh, prevBreakoutIdx,
    swingHighs: swingHighs.slice(-6),
    swingLows:  swingLows.slice(-6),
  };
}

// ── GWS-4H Analyse ────────────────────────────────────────────────────────
function analyze4HStructure(ohlcv4h) {
  if (!ohlcv4h || ohlcv4h.length < 8) return null;
  const n     = ohlcv4h.length;
  const highs = ohlcv4h.map(d => d.h);
  const lows  = ohlcv4h.map(d => d.l);
  const closes= ohlcv4h.map(d => d.c);

  const swingHighs = [];
  for (let i = 2; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] &&
        highs[i] >= highs[i+1] && highs[i] >= highs[i+2])
      swingHighs.push({ idx: i, date: ohlcv4h[i].d, price: highs[i] });
  }

  const swingLows = [];
  for (let i = 2; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] &&
        lows[i] <= lows[i+1] && lows[i] <= lows[i+2])
      swingLows.push({ idx: i, date: ohlcv4h[i].d, price: lows[i] });
  }

  // GWS-4H: Swing-Hochs nach denen mind. -2% folgte
  const gws4hCandidates = [];
  for (let i = 0; i < swingHighs.length; i++) {
    const sh = swingHighs[i];
    if (sh.idx + 1 >= n) continue;
    const minAfter = Math.min(...lows.slice(sh.idx + 1));
    if (minAfter < sh.price * 0.98) gws4hCandidates.push(sh);
  }

  const gws4hHigh     = gws4hCandidates.length > 0 ? gws4hCandidates[gws4hCandidates.length - 1] : null;
  const prevGws4hHigh = gws4hCandidates.length > 1 ? gws4hCandidates[gws4hCandidates.length - 2] : null;

  let breakout4hIdx = null;
  if (gws4hHigh) {
    for (let i = gws4hHigh.idx + 1; i < n; i++) {
      if (closes[i] > gws4hHigh.price) { breakout4hIdx = i; break; }
    }
  }

  let prevBreakout4hIdx = null;
  if (prevGws4hHigh) {
    for (let i = prevGws4hHigh.idx + 1; i < n; i++) {
      if (closes[i] > prevGws4hHigh.price) { prevBreakout4hIdx = i; break; }
    }
  }

  return {
    gws4hHigh, breakout4hIdx, broken4h: breakout4hIdx !== null,
    prevGws4hHigh, prevBreakout4hIdx,
    swingHighs: swingHighs.slice(-8),
    swingLows:  swingLows.slice(-8),
  };
}

// ── Weekly Candlestick Chart ───────────────────────────────────────────────
function ChartWeekly({ ohlcvW, structureW, chartId }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const W = 600, H = 260;
  const PL = 56, PR = 52, PT = 18, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;
  const n = ohlcvW.length;
  const allH = ohlcvW.map(d => d.h), allL = ohlcvW.map(d => d.l);
  const rawMax = Math.max(...allH), rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.07;
  const maxP = rawMax + pad, minP = rawMin - pad, range = maxP - minP;
  const toY = p => PT + (1 - (p - minP) / range) * cH;
  const toX = i => PL + (i + 0.5) * (cW / n);
  const bW  = Math.max(2, cW / n * 0.65);

  const yTicks = [];
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * range / 5);

  // Monats-Labels für Weekly
  const monthLabels = [];
  let lastMonth = null;
  ohlcvW.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) { monthLabels.push({ i, label: d.d.slice(5,7)+"/"+d.d.slice(2,4) }); lastMonth = m; }
  });

  const { gwswHigh, breakoutIdx, breakoutPrice, broken, prevGwswHigh, prevBreakoutIdx } = structureW || {};
  const gwswColor  = "#f59e0b"; // Amber für Weekly
  const gwswLineEnd = breakoutIdx !== null ? breakoutIdx : n - 1;

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.round((mx - PL) / (cW / n) - 0.5);
    setHover(idx >= 0 && idx < n ? idx : null);
  }, [n, cW]);

  const hd = hover !== null ? ohlcvW[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      <div style={{height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,background:"#0a0f1e",borderBottom:"1px solid #1e293b",fontSize:10,fontFamily:"monospace"}}>
        {hd ? <>
          <span style={{color:"#475569"}}>{hd.d}</span>
          <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
          <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
          <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
          <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
          <span style={{color:"#475569",marginLeft:"auto"}}>{hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%</span>
        </> : <span style={{color:"#334155"}}>Hover für OHLC-Details</span>}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)} style={{cursor:"crosshair"}}>
        <defs>
          <linearGradient id={`bgW_${chartId}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={broken?"#ef4444":"#f59e0b"} stopOpacity="0.10"/>
            <stop offset="100%" stopColor={broken?"#ef4444":"#f59e0b"} stopOpacity="0.01"/>
          </linearGradient>
        </defs>
        <rect x={PL} y={PT} width={cW} height={cH} fill="#07090f"/>

        {/* Gitter */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return <g key={k}>
            <line x1={PL} x2={PL+cW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
            <text x={PL-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">{val.toFixed(0)}</text>
          </g>;
        })}

        {/* Monatstrennlinien */}
        {monthLabels.map(({i, label}) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,4" opacity="0.25"/>
            <text x={toX(i)} y={PT+cH+14} textAnchor="middle" fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Breakout-Zone */}
        {breakoutIdx !== null && (
          <rect x={toX(breakoutIdx)} y={PT} width={PL+cW-toX(breakoutIdx)} height={cH} fill={`url(#bgW_${chartId})`}/>
        )}

        {/* Vorheriger GWS-W Break (gedimmt) */}
        {prevGwswHigh && (() => {
          const prevLineEnd = prevBreakoutIdx !== null ? prevBreakoutIdx : (gwswHigh ? gwswHigh.idx : n - 1);
          const y  = toY(prevGwswHigh.price);
          const x1 = toX(prevGwswHigh.idx);
          const x2 = toX(prevLineEnd);
          return <>
            <line x1={x1} x2={x2} y1={y} y2={y} stroke={gwswColor} strokeWidth="1.2" strokeDasharray="4,4" opacity="0.30"/>
            <text x={x1+4} y={y-4} fill={gwswColor+"55"} fontSize="7.5" fontFamily="monospace">
              GWS-W {prevGwswHigh.date.slice(5)} {prevBreakoutIdx !== null ? "✓" : ""}
            </text>
          </>;
        })()}

        {/* Aktueller GWS-W */}
        {gwswHigh && (() => {
          const y  = toY(breakoutPrice ?? gwswHigh.price);
          const x1 = toX(gwswHigh.idx);
          const x2 = toX(gwswLineEnd);
          return <>
            <rect x={x1} y={y} width={x2-x1} height={PT+cH-y} fill={gwswColor} opacity="0.03"/>
            <line x1={x1} x2={x2} y1={y} y2={y} stroke={gwswColor} strokeWidth="1.8" strokeDasharray="5,4"/>
            <rect x={PL-55} y={y-11} width={51} height={20} rx="3" fill="#0a0f1e" stroke={gwswColor} strokeWidth="0.8"/>
            <text x={PL-29} y={y-1} textAnchor="middle" fill={gwswColor} fontSize="8" fontWeight="700" fontFamily="monospace">GWS-W</text>
            <text x={PL-29} y={y+8} textAnchor="middle" fill={gwswColor} fontSize="7.5" fontFamily="monospace">{(breakoutPrice ?? gwswHigh.price).toFixed(1)}</text>
            <rect x={x2+2} y={y-9} width={46} height={16} rx="3" fill={gwswColor+"22"} stroke={gwswColor} strokeWidth="0.8"/>
            <text x={x2+25} y={y+4} textAnchor="middle" fill={gwswColor} fontSize="8" fontWeight="700" fontFamily="monospace">
              {broken ? "✓ BOC" : "Res."}
            </text>
          </>;
        })()}

        {/* Kerzen */}
        {ohlcvW.map((d, i) => {
          const bull = d.c >= d.o;
          const isBoc = i === breakoutIdx;
          const col  = bull ? "#22c55e" : "#ef4444";
          const bTop = toY(Math.max(d.o, d.c));
          const bH   = Math.max(1.5, toY(Math.min(d.o, d.c)) - bTop);
          const isHov = hover === i;
          return <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={toY(d.h)} y2={toY(d.l)} stroke={col} strokeWidth={isHov?1.5:1} opacity={0.9}/>
            <rect x={toX(i)-bW/2} y={bTop} width={bW} height={bH}
              fill={col} opacity={isBoc?1:isHov?0.95:0.8}
              stroke={isBoc?gwswColor:"none"} strokeWidth={isBoc?1.2:0}/>
          </g>;
        })}

        {/* Aktueller Preis */}
        <line x1={PL} x2={PL+cW} y1={toY(ohlcvW[n-1].c)} y2={toY(ohlcvW[n-1].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.45"/>
        <rect x={PL+cW+2} y={toY(ohlcvW[n-1].c)-8} width={46} height={15} rx="3" fill="#1e293b"/>
        <text x={PL+cW+25} y={toY(ohlcvW[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcvW[n-1].c.toFixed(2)}</text>

        {/* Crosshair */}
        {hover !== null && <>
          <line x1={toX(hover)} x2={toX(hover)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <line x1={PL} x2={PL+cW} y1={toY(ohlcvW[hover].c)} y2={toY(ohlcvW[hover].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <rect x={PL-52} y={toY(ohlcvW[hover].c)-8} width={48} height={15} rx="3" fill="#1e293b"/>
          <text x={PL-28} y={toY(ohlcvW[hover].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcvW[hover].c.toFixed(2)}</text>
        </>}
        <rect x={PL} y={PT} width={cW} height={cH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      <div style={{padding:"5px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f59e0b" strokeWidth="1.8" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>GWS-W</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f59e0b" strokeWidth="1.2" strokeDasharray="4,4" opacity="0.30"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Letzter Break</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>{ohlcvW.length} Wochen · Weekly</div>
      </div>

// ── Daily Candlestick Chart ────────────────────────────────────────────────
function CandleChart({ ohlcv, structure, chartId }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const W = 600, H = 270;
  const PL = 56, PR = 52, PT = 18, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;
  const n = ohlcv.length;
  const allH = ohlcv.map(d => d.h), allL = ohlcv.map(d => d.l);
  const rawMax = Math.max(...allH), rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.07;
  const maxP = rawMax + pad, minP = rawMin - pad, range = maxP - minP;
  const toY = p => PT + (1 - (p - minP) / range) * cH;
  const toX = i => PL + (i + 0.5) * (cW / n);
  const bW  = Math.max(2, cW / n * 0.65);

  const yTicks = [];
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * range / 5);

  const monthLabels = [];
  let lastMonth = null;
  ohlcv.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) { monthLabels.push({ i, label: d.d.slice(5,7)+"/"+d.d.slice(2,4) }); lastMonth = m; }
  });

  const { gwsdHigh, breakoutIdx, breakoutPrice, broken, prevGwsdHigh, prevBreakoutIdx, lastLowAfterGwsd } = structure || {};
  const gwsdColor   = "#ef4444";
  const gwsdLineEnd = breakoutIdx !== null ? breakoutIdx : n - 1;

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.round((mx - PL) / (cW / n) - 0.5);
    setHover(idx >= 0 && idx < n ? idx : null);
  }, [n, cW]);

  const hd = hover !== null ? ohlcv[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      <div style={{height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,background:"#0a0f1e",borderBottom:"1px solid #1e293b",fontSize:10,fontFamily:"monospace"}}>
        {hd ? <>
          <span style={{color:"#475569"}}>{hd.d}</span>
          <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
          <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
          <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
          <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
          <span style={{color:"#475569",marginLeft:"auto"}}>{hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%</span>
        </> : <span style={{color:"#334155"}}>Hover für OHLC-Details</span>}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)} style={{cursor:"crosshair"}}>
        <defs>
          <linearGradient id={`bg_${chartId}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={broken?"#ef4444":"#22c55e"} stopOpacity="0.12"/>
            <stop offset="100%" stopColor={broken?"#ef4444":"#22c55e"} stopOpacity="0.01"/>
          </linearGradient>
        </defs>
        <rect x={PL} y={PT} width={cW} height={cH} fill="#07090f"/>

        {/* Gitter */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return <g key={k}>
            <line x1={PL} x2={PL+cW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
            <text x={PL-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">{val.toFixed(0)}</text>
          </g>;
        })}

        {/* Monatstrennlinien */}
        {monthLabels.map(({i, label}) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,4" opacity="0.25"/>
            <text x={toX(i)} y={PT+cH+14} textAnchor="middle" fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Breakout-Zone */}
        {breakoutIdx !== null && (
          <rect x={toX(breakoutIdx)} y={PT}
            width={PL+cW-toX(breakoutIdx)} height={cH}
            fill={`url(#bg_${chartId})`}/>
        )}

        {/* Letztes Tief nach GWS-D (Bearish-Level, grün gestrichelt) */}
        {lastLowAfterGwsd && !broken && (() => {
          const y = toY(lastLowAfterGwsd.price);
          return <>
            <line x1={toX(lastLowAfterGwsd.idx)} x2={PL+cW} y1={y} y2={y}
              stroke="#22c55e" strokeWidth="1.0" strokeDasharray="3,4" opacity="0.45"/>
            <text x={toX(lastLowAfterGwsd.idx)+3} y={y+9} fill="#22c55e88" fontSize="7.5" fontFamily="monospace">
              Bearish &lt; {lastLowAfterGwsd.price.toFixed(1)}
            </text>
          </>;
        })()}

        {/* Vorheriger GWS-D Break (gedimmt) */}
        {prevGwsdHigh && (() => {
          const prevLineEnd = prevBreakoutIdx !== null ? prevBreakoutIdx : (gwsdHigh ? gwsdHigh.idx : n - 1);
          const y  = toY(prevGwsdHigh.price);
          const x1 = toX(prevGwsdHigh.idx);
          const x2 = toX(prevLineEnd);
          return <>
            <line x1={x1} x2={x2} y1={y} y2={y} stroke="#ef4444" strokeWidth="1.2" strokeDasharray="4,4" opacity="0.35"/>
            <text x={x1+4} y={y-4} fill="#ef444466" fontSize="7.5" fontFamily="monospace">
              GWS-D {prevGwsdHigh.date.slice(5)} {prevBreakoutIdx !== null ? "✓" : ""}
            </text>
          </>;
        })()}

        {/* Aktueller GWS-D: Breakout-Level (letztes Hoch des Retracements) */}
        {gwsdHigh && (() => {
          const levelPrice = breakoutPrice ?? gwsdHigh.price;
          const y  = toY(levelPrice);
          const x1 = toX(gwsdHigh.idx);
          const x2 = toX(gwsdLineEnd);
          return <>
            <rect x={x1} y={y} width={x2-x1} height={PT+cH-y} fill={gwsdColor} opacity="0.04"/>
            <line x1={x1} x2={x2} y1={y} y2={y} stroke={gwsdColor} strokeWidth="1.8" strokeDasharray="5,4"/>
            {/* Label links */}
            <rect x={PL-55} y={y-11} width={51} height={20} rx="3" fill="#0a0f1e" stroke={gwsdColor} strokeWidth="0.8"/>
            <text x={PL-29} y={y-1} textAnchor="middle" fill={gwsdColor} fontSize="8" fontWeight="700" fontFamily="monospace">GWS-D</text>
            <text x={PL-29} y={y+8} textAnchor="middle" fill={gwsdColor} fontSize="7.5" fontFamily="monospace">{levelPrice.toFixed(1)}</text>
            {/* Label rechts am Linienende */}
            <rect x={x2+2} y={y-9} width={46} height={16} rx="3" fill={gwsdColor+"22"} stroke={gwsdColor} strokeWidth="0.8"/>
            <text x={x2+25} y={y+4} textAnchor="middle" fill={gwsdColor} fontSize="8" fontWeight="700" fontFamily="monospace">
              {broken ? "🔥 BOC" : "Res."}
            </text>
          </>;
        })()}

        {/* Kerzen */}
        {ohlcv.map((d, i) => {
          const bull = d.c >= d.o;
          const isBoc = i === breakoutIdx;
          const col  = bull ? "#22c55e" : "#ef4444";
          const bTop = toY(Math.max(d.o, d.c));
          const bH   = Math.max(1.5, toY(Math.min(d.o, d.c)) - bTop);
          const isHov = hover === i;
          return <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={toY(d.h)} y2={toY(d.l)} stroke={col} strokeWidth={isHov?1.5:1} opacity={0.9}/>
            <rect x={toX(i)-bW/2} y={bTop} width={bW} height={bH}
              fill={col} opacity={isBoc?1:isHov?0.95:0.8}
              stroke={isBoc?"#ef4444":"none"} strokeWidth={isBoc?1.2:0}/>
          </g>;
        })}

        {/* Aktueller Preis */}
        <line x1={PL} x2={PL+cW} y1={toY(ohlcv[n-1].c)} y2={toY(ohlcv[n-1].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.45"/>
        <rect x={PL+cW+2} y={toY(ohlcv[n-1].c)-8} width={46} height={15} rx="3" fill="#1e293b"/>
        <text x={PL+cW+25} y={toY(ohlcv[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcv[n-1].c.toFixed(2)}</text>

        {/* Crosshair */}
        {hover !== null && <>
          <line x1={toX(hover)} x2={toX(hover)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <line x1={PL} x2={PL+cW} y1={toY(ohlcv[hover].c)} y2={toY(ohlcv[hover].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <rect x={PL-52} y={toY(ohlcv[hover].c)-8} width={48} height={15} rx="3" fill="#1e293b"/>
          <text x={PL-28} y={toY(ohlcv[hover].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcv[hover].c.toFixed(2)}</text>
        </>}
        <rect x={PL} y={PT} width={cW} height={cH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      <div style={{padding:"5px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#ef4444" strokeWidth="1.8" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>GWS-D</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#ef4444" strokeWidth="1.2" strokeDasharray="4,4" opacity="0.35"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Letzter Break</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#22c55e" strokeWidth="1.0" strokeDasharray="3,4" opacity="0.45"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Bearish-Level</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>{ohlcv.length} Tage · Daily</div>
      </div>
    </div>
  );
}

function SignalBadge({ structure }) {
  if (!structure) return <span style={{color:"#334155",fontSize:9}}>—</span>;
  if (structure.broken) {
    return (
      <span style={{
        background:"#2d0808", border:"1px solid #ef4444",

}

        setData(json);
        // Ersten Ticker mit Daily-Daten vorauswählen
        const first = json.data.find(d => d.ohlcv?.length > 0);
        if (first) setSelected(first.ticker);
      })
      .catch(e => setError(e.message));
  }, []);

  const rsData = useMemo(() => {
    if (!data) return [];
    return data.data.map(d => ({ t: d.ticker, s: d.score, w: d.windows }));
  }, [data]);

  const sorted = useMemo(() =>
    [...rsData].sort((a, b) =>
      sortBy === "score" ? b.s - a.s : (b.w[sortBy]??-999) - (a.w[sortBy]??-999)
    ), [rsData, sortBy]);

  const rows = showAll ? sorted : sorted.slice(0, 20);

  // Weekly OHLCV
  const ohlcvW = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv_w?.length > 0 ? entry.ohlcv_w : null;
  }, [data, selected]);

  // Daily OHLCV
  const ohlcv = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv?.length > 0 ? entry.ohlcv : null;
  }, [data, selected]);

  // 4H OHLCV: nur echte Daten
  const ohlcv4h = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv_4h?.length > 0 ? entry.ohlcv_4h : null;
  }, [data, selected]);

  const structureW  = useMemo(() => analyzeWeeklyStructure(ohlcvW), [ohlcvW]);
  const structure   = useMemo(() => analyzeStructure(ohlcv), [ohlcv]);
  const structure4h = useMemo(() => analyze4HStructure(ohlcv4h), [ohlcv4h]);

  // Struktur aller Top-20 (für Badges in Tabelle)
  const structureMap = useMemo(() => {
    if (!data) return {};
    const map = {};
    sorted.slice(0, 20).forEach(item => {
      const entry = data.data.find(d => d.ticker === item.t);
      if (entry?.ohlcv?.length > 0) map[item.t] = analyzeStructure(entry.ohlcv);
    });
    return map;
  }, [data, sorted]);

  // 4H anzeigen: nur bei kürzlichem oder aktivem Daily-Breach
  const show4H = structure?.broken && ohlcv4h && structure4h;

  const selectedRs = rsData.find(d => d.t === selected);
  const top20      = data?.top20 ?? [];

  const sel = {
    background:"#1e293b", border:"1px solid #334155",
    color:"#e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:12, cursor:"pointer"
  };

  if (error) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#f87171",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:18}}>⚠ Fehler beim Laden</span>
      <span style={{fontSize:12,color:"#475569"}}>{error}</span>
      <span style={{fontSize:11,color:"#334155"}}>Stelle sicher, dass rs_full.json im selben Verzeichnis liegt.</span>
    </div>
  );
  if (!data) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#475569",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:24}}>⟳</span>
      <span style={{fontSize:12}}>Lade rs_full.json …</span>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"'Inter',system-ui,sans-serif",padding:"16px 12px"}}>

      {/* Header */}
      <div style={{marginBottom:14}}>
        <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#f8fafc"}}>⚡ RS · QQQ</h1>
        <p style={{margin:"2px 0 0",color:"#475569",fontSize:11}}>Outperformance vs. Nasdaq 100 · {data.timestamp}</p>
      </div>

      {/* Steuerung */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Sortieren</label>
          <select style={sel} value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="score">Score</option>
            {WINDOWS.map(w => <option key={w} value={w}>{w}</option>)}
          </select>
        </div>
      </div>

      {/* RS-Tabelle */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginBottom:12,overflowX:"auto"}}>
        <div style={{minWidth:480}}>
          <div style={{display:"grid",gridTemplateColumns:"22px 50px 56px 60px repeat(5,1fr)",padding:"6px 10px",background:"#1e293b",gap:3,fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>
            <span>#</span><span>Ticker</span><span>Score</span><span>Signal</span>
            {WINDOWS.map(w => <span key={w} style={{textAlign:"center"}}>{w}</span>)}
          </div>

          {rows.map(item => {
            const rank       = sorted.indexOf(item);
            const isTop      = rank < 20;
            // Alle Ticker mit Daten sind klickbar
            const hasChart   = data.data.find(d=>d.ticker===item.t)?.ohlcv?.length > 0;
            const struct     = structureMap[item.t];
            const isBOC      = struct?.broken;

            return (
              <div key={item.t}
                onClick={() => hasChart && setSelected(item.t)}
                style={{
                  display:"grid", gridTemplateColumns:"22px 50px 56px 60px repeat(5,1fr)",
                  padding:"6px 10px", gap:3,
                  borderTop:`1px solid ${isBOC?"#ef444422":"#0a0f1e"}`,
                  background: isBOC
                    ? (item.t===selected?"#3a0808":"#160303")
                    : item.t===selected ? "#1a2f4a"
                    : isTop ? (rank%2===0?"#0d1526":"#0a1020") : "#07090f",
                  opacity: isTop ? 1 : 0.25,
                  alignItems:"center",
                  cursor: hasChart ? "pointer" : "default",
                  borderLeft: isBOC ? "2px solid #ef4444"
                    : item.t===selected ? "2px solid #3b82f6" : "2px solid transparent",
                }}>
                <span style={{fontSize:10,fontWeight:700,color:rank===0?"#f59e0b":rank<3?"#94a3b8":"#334155"}}>{rank+1}</span>
                <span style={{fontWeight:700,fontSize:11,fontFamily:"monospace",
                  color:isBOC?"#fca5a5":rank===0?"#fbbf24":isTop?"#f1f5f9":"#475569",
                  display:"flex",alignItems:"center",gap:3}}>
                  {isBOC && <span className="flame-anim" style={{fontSize:11}}>🔥</span>}
                  {item.t}
                  {hasChart && <span style={{fontSize:8,color:"#334155",marginLeft:2}}>▸</span>}
                </span>
                <span style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color:item.s>0?"#4ade80":"#f87171"}}>
                  {item.s>0?"+":""}{Math.round(item.s)}
                </span>
                <span><SignalBadge structure={struct}/></span>
                {WINDOWS.map(w => (
                  <div key={w} style={{textAlign:"center"}}><Cell v={item.w[w]}/></div>
                ))}
              </div>
            );
          })}

          {/* Toggle Alle / Zurück auf Top 20 */}
          <div style={{textAlign:"center",padding:"8px",borderTop:"1px solid #0a0f1e"}}>
            {showAll ? (
              <button onClick={() => setShowAll(false)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                ↑ Zurück auf Top 20
              </button>
            ) : sorted.length > 20 ? (
              <button onClick={() => setShowAll(true)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                Alle {rsData.length} anzeigen ↓
              </button>
            ) : null}
          </div>
        </div>
      </div>

      {/* Portfolio-Schnellauswahl */}
      <div style={{background:"#0f172a",borderRadius:10,padding:12,border:"1px solid #1e293b",marginBottom:12}}>
        <p style={{margin:"0 0 6px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Portfolio · Top 20</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {sorted.slice(0,20).map((d,i) => {
            const hasChart = data.data.find(e=>e.ticker===d.t)?.ohlcv?.length > 0;
            const isBOC   = structureMap[d.t]?.broken;
            return (
              <span key={d.t}
                onClick={()=>hasChart&&setSelected(d.t)}
                style={{
                  background:isBOC?"#160303":i<3?"#1a2f4a":"#1e293b",
                  border:`1px solid ${d.t===selected?"#3b82f6":isBOC?"#ef4444":i<3?"#2563eb":"#334155"}`,
                  borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:700,
                  color:isBOC?"#fca5a5":i<3?"#93c5fd":"#94a3b8",
                  fontFamily:"monospace", cursor:hasChart?"pointer":"default"
                }}>
                {isBOC&&"🔥"}{d.t}
              </span>
            );
          })}
        </div>
      </div>

      {/* Strukturanalyse */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          {/* Nur Ticker anzeigen, kein Header-Text */}
          <p style={{margin:0,fontSize:15,fontWeight:800,color:"#f1f5f9",fontFamily:"monospace"}}>{selected ?? "–"}</p>
          {selectedRs && (
            <span style={{fontSize:11,fontFamily:"monospace",color:selectedRs.s>0?"#4ade80":"#f87171"}}>
              RS Score: {selectedRs.s>0?"+":""}{Math.round(selectedRs.s)}
            </span>
          )}
        </div>

        {(ohlcvW || ohlcv) && (ohlcvW && structureW || structure) ? (
          <>
            {/* Status-Badge */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              {structure?.broken ? (
                <span className="red-glow" style={{
                  background:"#2d0808", border:"2px solid #ef4444",
                  color:"#ef4444", borderRadius:5, padding:"3px 10px",
                  fontSize:11, fontWeight:800, display:"flex", alignItems:"center", gap:5
                }}>
                  <span className="flame-anim">🔥</span> GWS-D gebrochen – Jetzt handeln! <span className="flame-anim">🔥</span>
                </span>
              ) : structure?.gwsdHigh ? (
                <span style={{background:"#1c1108",border:"1px solid #f59e0b",color:"#fbbf24",borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600}}>
                  ⏳ Phase 2 – Warte auf GWS-D Breakout
                </span>
              ) : structure ? (
                <span style={{background:"#052e16",border:"1px solid #16a34a",color:"#4ade80",borderRadius:5,padding:"3px 8px",fontSize:11}}>
                  Phase 1 – RS aufbauen
                </span>
              ) : null}
            </div>

            {/* Weekly Chart – immer angezeigt wenn Daten vorhanden */}
            {ohlcvW && structureW && (
              <div style={{marginBottom:10}}>
                <ChartWeekly ohlcvW={ohlcvW} structureW={structureW} chartId={selected+"_w"}/>
              </div>
            )}

            {/* Daily Chart – immer angezeigt */}
            {ohlcv && structure && (
              <CandleChart ohlcv={ohlcv} structure={structure} chartId={selected+"_d"}/>
            )}

            {/* 4H Chart – nur wenn Daily bullish (GWS-D gebrochen) */}
            {show4H && (
              <div style={{marginTop:14}}>
                <Chart4H ohlcv4h={ohlcv4h} structure4h={structure4h} chartId={selected+"_4h"}/>
              </div>
            )}
          </>
        ) : (
          <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>
            Klick auf einen Ticker mit ▸ für Strukturanalyse.
          </div>
        )}
      </div>

      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:8}}>
        Echte Daten via yfinance · Kein Handelssignal · Stand {data.timestamp}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
