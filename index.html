// ── Strukturanalyse ─────────────────────────────────────────────────────────
// Erkennt: Downmove-Hoch, Breakout, Retracement-Hoch nach Breakout
function analyzeStructure(ohlcv) {
  if (!ohlcv || ohlcv.length < 10) return null;
  const n = ohlcv.length;
  const highs = ohlcv.map(d => d.h);
  const lows  = ohlcv.map(d => d.l);
  const closes = ohlcv.map(d => d.c);

  // Swing-Hochs (3 Kerzen links + rechts)
  const swingHighs = [];
  for (let i = 3; i < n - 2; i++) {
    if (highs[i] >= highs[i-1] && highs[i] >= highs[i-2] &&
        highs[i] >= highs[i+1] && highs[i] >= highs[i+2]) {
      swingHighs.push({ idx: i, date: ohlcv[i].d, price: highs[i] });
    }
  }
  // Swing-Tiefs
  const swingLows = [];
  for (let i = 3; i < n - 2; i++) {
    if (lows[i] <= lows[i-1] && lows[i] <= lows[i-2] &&
        lows[i] <= lows[i+1] && lows[i] <= lows[i+2]) {
      swingLows.push({ idx: i, date: ohlcv[i].d, price: lows[i] });
    }
  }

  const currentClose = closes[n - 1];

  // Letztes Downmove-Hoch: Swing-Hoch, nach dem der Kurs mind. 5% fiel
  let lastDownmoveHigh = null;
  for (let i = swingHighs.length - 1; i >= 0; i--) {
    const sh = swingHighs[i];
    const subsLows = lows.slice(sh.idx);
    const minAfter = Math.min(...subsLows);
    if (minAfter < sh.price * 0.95) { lastDownmoveHigh = sh; break; }
  }

  // Breakout: erste Kerze die über Downmove-Hoch schließt
  let breakoutIdx = null;
  if (lastDownmoveHigh) {
    for (let i = lastDownmoveHigh.idx + 1; i < n; i++) {
      if (closes[i] > lastDownmoveHigh.price) { breakoutIdx = i; break; }
    }
  }
  const broken = breakoutIdx !== null;

  // Retracement-Hoch nach Breakout: höchstes Swing-Hoch NACH dem Breakout
  // Das ist das nächste Entry-Level
  let retracementHigh = null;
  if (broken && breakoutIdx !== null) {
    // Swing-Hochs die nach dem Breakout liegen
    const postBreakoutHighs = swingHighs.filter(sh => sh.idx > breakoutIdx);
    if (postBreakoutHighs.length > 0) {
      // Nimm das letzte (aktuellste) Swing-Hoch nach Breakout als Retracement-Hoch
      retracementHigh = postBreakoutHighs[postBreakoutHighs.length - 1];
    }
    // Falls kein Swing-Hoch nach Breakout: verwende das Hoch der Breakout-Kerze selbst
    if (!retracementHigh) {
      retracementHigh = { idx: breakoutIdx, date: ohlcv[breakoutIdx].d, price: highs[breakoutIdx] };
    }
  }

  // Ist das Retracement-Hoch gebrochen? (Entry-Signal)
  const retracementBroken = retracementHigh && currentClose > retracementHigh.price;

  // Trend (letzte 2 Swing-Hochs)
  let trend = "neutral";
  if (swingHighs.length >= 2) {
    const last = swingHighs[swingHighs.length - 1];
    const prev = swingHighs[swingHighs.length - 2];
    if (last.price > prev.price) trend = "bullish";
    else if (last.price < prev.price) trend = "bearish";
  }

  return {
    currentClose,
    lastDownmoveHigh,
    broken,
    breakoutIdx,
    retracementHigh,
    retracementBroken,
    trend,
    swingHighs: swingHighs.slice(-6),
    swingLows: swingLows.slice(-6),
    setup: broken && trend !== "bearish"
  };
}

// ── Candlestick-Chart ───────────────────────────────────────────────────────
function CandleChart({ ohlcv, structure }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);

  const W = 600, H = 280;
  const PAD_LEFT = 52, PAD_RIGHT = 48, PAD_TOP = 18, PAD_BOTTOM = 32;
  const chartW = W - PAD_LEFT - PAD_RIGHT;
  const chartH = H - PAD_TOP - PAD_BOTTOM;

  const n = ohlcv.length;
  const allH = ohlcv.map(d => d.h);
  const allL = ohlcv.map(d => d.l);

  const rawMax = Math.max(...allH);
  const rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.07;
  const maxP = rawMax + pad;
  const minP = rawMin - pad;
  const range = maxP - minP;

  const toY = p => PAD_TOP + (1 - (p - minP) / range) * chartH;
  const toX = i => PAD_LEFT + (i + 0.5) * (chartW / n);
  const barW = Math.max(2, chartW / n * 0.65);

  // Y-Achsen-Ticks
  const yTicks = [];
  const step = range / 5;
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * step);

  // Monats-Labels
  const monthLabels = [];
  let lastMonth = null;
  ohlcv.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) {
      monthLabels.push({ i, label: d.d.slice(5, 7) + "/" + d.d.slice(2, 4) });
      lastMonth = m;
    }
  });

  const breakoutIdx = structure?.breakoutIdx ?? null;

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const idx = Math.round((mx - PAD_LEFT) / (chartW / n) - 0.5);
    if (idx >= 0 && idx < n) setHover(idx);
    else setHover(null);
  }, [n, chartW]);

  const hd = hover !== null ? ohlcv[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      {/* OHLC Tooltip-Bar */}
      <div style={{
        height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,
        background:"#0a0f1e",borderBottom:"1px solid #1e293b",
        fontSize:10,fontFamily:"monospace"
      }}>
        {hd ? (
          <>
            <span style={{color:"#475569"}}>{hd.d}</span>
            <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
            <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
            <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
            <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
            <span style={{color:"#475569",marginLeft:"auto"}}>{hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%</span>
          </>
        ) : (
          <span style={{color:"#334155"}}>Hover für OHLC-Details</span>
        )}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove} onMouseLeave={() => setHover(null)}
        style={{cursor:"crosshair"}}>
        <defs>
          <linearGradient id="breakoutGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#22c55e" stopOpacity="0.13"/>
            <stop offset="100%" stopColor="#22c55e" stopOpacity="0.01"/>
          </linearGradient>
          <linearGradient id="downGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.07"/>
            <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0"/>
          </linearGradient>
          <linearGradient id="retGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.10"/>
            <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.01"/>
          </linearGradient>
        </defs>

        {/* Hintergrund */}
        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="#07090f"/>

        {/* Y-Gridlines + Labels */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return (
            <g key={k}>
              <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
              <text x={PAD_LEFT-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">
                {val.toFixed(0)}
              </text>
            </g>
          );
        })}

        {/* Monats-Labels */}
        {monthLabels.map(({ i, label }) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PAD_TOP} y2={PAD_TOP+chartH} stroke="#131c2e" strokeWidth="1" strokeDasharray="2,4"/>
            <text x={toX(i)} y={PAD_TOP+chartH+14} textAnchor="middle" fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Zone vor Breakout (gelb) */}
        {structure?.lastDownmoveHigh && breakoutIdx !== null && (
          <rect x={PAD_LEFT} y={PAD_TOP} width={toX(breakoutIdx)-PAD_LEFT} height={chartH} fill="url(#downGrad)"/>
        )}

        {/* Zone nach Breakout bis Retracement-Hoch (grün) */}
        {breakoutIdx !== null && structure?.retracementHigh && (
          <rect
            x={toX(breakoutIdx)-barW}
            y={PAD_TOP}
            width={toX(structure.retracementHigh.idx)-(toX(breakoutIdx)-barW)+barW}
            height={chartH}
            fill="url(#breakoutGrad)"
          />
        )}

        {/* Zone nach Retracement-Hoch (blau = Entry-Zone) */}
        {structure?.retracementHigh && (
          <rect
            x={toX(structure.retracementHigh.idx)}
            y={PAD_TOP}
            width={PAD_LEFT+chartW-toX(structure.retracementHigh.idx)}
            height={chartH}
            fill="url(#retGrad)"
          />
        )}

        {/* ── Linien ── */}

        {/* Downmove-Hoch Linie (gelb) */}
        {structure?.lastDownmoveHigh && (() => {
          const y = toY(structure.lastDownmoveHigh.price);
          const color = structure.broken ? "#22c55e" : "#f59e0b";
          return (
            <>
              <rect x={PAD_LEFT} y={y} width={chartW} height={PAD_TOP+chartH-y} fill={color} opacity="0.03"/>
              <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={y} y2={y} stroke={color} strokeWidth="1.5" strokeDasharray="5,4"/>
              <rect x={PAD_LEFT-48} y={y-9} width={44} height={16} rx="3" fill="#0a0f1e" stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT-26} y={y+4} textAnchor="middle" fill={color} fontSize="9" fontWeight="700" fontFamily="monospace">
                {structure.lastDownmoveHigh.price.toFixed(1)}
              </text>
              <rect x={PAD_LEFT+chartW+2} y={y-9} width={44} height={16} rx="3" fill={color+"22"} stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT+chartW+24} y={y+4} textAnchor="middle" fill={color} fontSize="8" fontWeight="700" fontFamily="monospace">
                {structure.broken ? "✓ BOC" : "Res."}
              </text>
            </>
          );
        })()}

        {/* Retracement-Hoch Linie (blau, gestrichelt) */}
        {structure?.retracementHigh && (() => {
          const y = toY(structure.retracementHigh.price);
          const color = structure.retracementBroken ? "#60a5fa" : "#3b82f6";
          return (
            <>
              <line x1={toX(structure.retracementHigh.idx)} x2={PAD_LEFT+chartW} y1={y} y2={y}
                stroke={color} strokeWidth="1.3" strokeDasharray="3,3"/>
              <rect x={PAD_LEFT-48} y={y-9} width={44} height={16} rx="3" fill="#0a0f1e" stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT-26} y={y+4} textAnchor="middle" fill={color} fontSize="9" fontWeight="700" fontFamily="monospace">
                {structure.retracementHigh.price.toFixed(1)}
              </text>
              <rect x={PAD_LEFT+chartW+2} y={y-9} width={44} height={16} rx="3" fill={color+"22"} stroke={color} strokeWidth="0.8"/>
              <text x={PAD_LEFT+chartW+24} y={y+4} textAnchor="middle" fill={color} fontSize="7.5" fontWeight="700" fontFamily="monospace">
                {structure.retracementBroken ? "✓ RET" : "4H-Ret"}
              </text>
            </>
          );
        })()}

        {/* Swing-Hoch Marker (Dreieck oben) */}
        {structure?.swingHighs?.map((sh, k) => {
          const x = toX(sh.idx);
          const y = toY(sh.price);
          const isDownHigh = structure.lastDownmoveHigh && sh.idx === structure.lastDownmoveHigh.idx;
          const isRetHigh = structure.retracementHigh && sh.idx === structure.retracementHigh.idx;
          if (isDownHigh) return null;
          return (
            <g key={k}>
              <polygon points={`${x},${y-11} ${x-4},${y-4} ${x+4},${y-4}`}
                fill={isRetHigh ? "#3b82f6" : "#f59e0b"} opacity="0.8"/>
            </g>
          );
        })}

        {/* Swing-Tief Marker (Dreieck unten) */}
        {structure?.swingLows?.map((sl, k) => {
          const x = toX(sl.idx);
          const y = toY(sl.price);
          return (
            <g key={k}>
              <polygon points={`${x},${y+11} ${x-4},${y+4} ${x+4},${y+4}`} fill="#3b82f6" opacity="0.4"/>
            </g>
          );
        })}

        {/* Breakout-Kerze Highlight */}
        {breakoutIdx !== null && (() => {
          const x = toX(breakoutIdx);
          return <rect x={x-barW*0.8} y={PAD_TOP} width={barW*1.6} height={chartH} fill="#22c55e" opacity="0.08" rx="1"/>;
        })()}

        {/* Kerzen */}
        {ohlcv.map((d, i) => {
          const x = toX(i);
          const bullish = d.c >= d.o;
          const isBreakout = i === breakoutIdx;
          const color = bullish ? "#22c55e" : "#ef4444";
          const bodyTop = toY(Math.max(d.o, d.c));
          const bodyBot = toY(Math.min(d.o, d.c));
          const bodyH = Math.max(1.5, bodyBot - bodyTop);
          const isHovered = hover === i;
          return (
            <g key={i}>
              <line x1={x} x2={x} y1={toY(d.h)} y2={toY(d.l)}
                stroke={color} strokeWidth={isHovered ? 1.5 : 1} opacity={isBreakout ? 1 : 0.9}/>
              <rect x={x-barW/2} y={bodyTop} width={barW} height={bodyH}
                fill={color}
                opacity={isBreakout ? 1 : isHovered ? 0.95 : 0.8}
                stroke={isBreakout ? "#fff" : isHovered ? color : "none"}
                strokeWidth={isBreakout ? 0.5 : 0}/>
            </g>
          );
        })}

        {/* Letzter Kurs */}
        <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={toY(ohlcv[n-1].c)} y2={toY(ohlcv[n-1].c)}
          stroke="#94a3b8" strokeWidth="0.6" strokeDasharray="2,3" opacity="0.4"/>
        <rect x={PAD_LEFT+chartW+2} y={toY(ohlcv[n-1].c)-8} width={44} height={15} rx="3" fill="#1e293b"/>
        <text x={PAD_LEFT+chartW+24} y={toY(ohlcv[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">
          {ohlcv[n-1].c.toFixed(2)}
        </text>

        {/* Crosshair */}
        {hover !== null && (
          <>
            <line x1={toX(hover)} x2={toX(hover)} y1={PAD_TOP} y2={PAD_TOP+chartH} stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
            <line x1={PAD_LEFT} x2={PAD_LEFT+chartW} y1={toY(ohlcv[hover].c)} y2={toY(ohlcv[hover].c)} stroke="#475569" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.6"/>
            <rect x={PAD_LEFT-48} y={toY(ohlcv[hover].c)-8} width={44} height={15} rx="3" fill="#1e293b"/>
            <text x={PAD_LEFT-26} y={toY(ohlcv[hover].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">
              {ohlcv[hover].c.toFixed(2)}
            </text>
          </>
        )}

        {/* Rahmen */}
        <rect x={PAD_LEFT} y={PAD_TOP} width={chartW} height={chartH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      {/* Legende */}
      <div style={{padding:"6px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Downmove-Hoch</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#22c55e" strokeWidth="1.5" strokeDasharray="4,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Breakout ✓</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#3b82f6" strokeWidth="1.3" strokeDasharray="3,3"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Retracement-Hoch (4H-Entry)</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="10" height="10"><polygon points="5,0 0,8 10,8" fill="#f59e0b" opacity="0.8"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Swing-Hoch</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="10" height="10"><polygon points="5,10 0,2 10,2" fill="#3b82f6" opacity="0.5"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>Swing-Tief</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>
          {n} Handelstage · Daily
        </div>
      </div>
    </div>
  );
}

// ── Hilfsfunktionen ─────────────────────────────────────────────────────────
const WINDOWS = ["5T","10T","20T","50T","6M"];

function Cell({ v }) {
  if (v == null) return <span style={{color:"#334155"}}>—</span>;
  return <span style={{color:v>0?"#4ade80":"#f87171",fontFamily:"monospace",fontSize:11}}>{v>0?"+":""}{v}</span>;
}

// ── Legende Tabelle ─────────────────────────────────────────────────────────
function TableLegend() {
  return (
    <div style={{
      marginBottom:10,padding:"8px 12px",
      background:"#07090f",borderRadius:7,border:"1px solid #1a2235",
      fontSize:10,color:"#64748b",lineHeight:1.8
    }}>
      <strong style={{color:"#475569",display:"block",marginBottom:4}}>Legende Tabelle</strong>
      <span style={{marginRight:14}}>▸ = OHLCV-Daten verfügbar → Klick für Chartanalyse</span>
      <span style={{marginRight:14}}>🔥 = Downmove-Hoch bereits gebrochen (Breakout bestätigt)</span>
      <span>⏳ = Wartet noch auf Breakout über das Downmove-Hoch</span>
    </div>
  );
}

// ── Haupt-App ───────────────────────────────────────────────────────────────
function App() {
  const [topN, setTopN]       = useState(10);
  const [sortBy, setSortBy]   = useState("score");
  const [showAll, setShowAll] = useState(false);
  const [selected, setSelected] = useState("ARM");
  const [rsData, setRsData]   = useState(null);
  const [dataSource, setDataSource] = useState("Lade...");

  // Versuche externe JSON zu laden
  useEffect(() => {
    fetch("rs_full.json")
      .then(r => { if (!r.ok) throw new Error("not found"); return r.json(); })
      .then(json => {
        setRsData(json);
        setDataSource(`rs_full.json · Stand ${json.timestamp}`);
      })
      .catch(() => {
        setRsData(FALLBACK_DATA);
        setDataSource(`Eingebettete Daten · Stand ${FALLBACK_DATA.timestamp}`);
      });
  }, []);

  const allData = rsData?.data ?? [];
  const top20   = rsData?.top20 ?? [];

  // RS_DATA-kompatibles Format für Tabelle
  const tableData = useMemo(() => allData.map(d => ({
    t: d.ticker,
    s: d.score,
    w: d.windows,
    hasOhlcv: d.ohlcv && d.ohlcv.length > 10
  })), [allData]);

  const sorted = useMemo(() =>
    [...tableData].sort((a,b) => sortBy === "score" ? b.s - a.s : (b.w[sortBy]??-999) - (a.w[sortBy]??-999)),
    [tableData, sortBy]);

  const rows = showAll ? sorted : sorted.slice(0, Math.max(topN + 5, 15));

  const selectedEntry = allData.find(d => d.ticker === selected);
  const ohlcv = selectedEntry?.ohlcv?.length > 10 ? selectedEntry.ohlcv : null;
  const structure = useMemo(() => analyzeStructure(ohlcv), [ohlcv]);

  // Status-Emoji für Tabelle: 🔥 wenn Breakout bestätigt, ⏳ wenn wartend
  // Berechne Breakout-Status für alle Ticker mit OHLCV
  const breakoutStatus = useMemo(() => {
    const map = {};
    allData.forEach(d => {
      if (!d.ohlcv || d.ohlcv.length < 10) return;
      const s = analyzeStructure(d.ohlcv);
      if (s) map[d.ticker] = s.broken;
    });
    return map;
  }, [allData]);

  const sel = {background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"};

  if (!rsData) return (
    <div style={{minHeight:"100vh",background:"#060b14",display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontSize:14}}>
      Lade Daten…
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"'Inter',system-ui,sans-serif",padding:"16px 12px"}}>
      {/* Header */}
      <div style={{marginBottom:14}}>
        <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#f8fafc"}}>⚡ RS · QQQ</h1>
        <p style={{margin:"2px 0 0",color:"#475569",fontSize:11}}>Outperformance vs. Nasdaq 100 · {dataSource}</p>
      </div>

      {/* Steuerung */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Top N</label>
          <select style={sel} value={topN} onChange={e=>setTopN(+e.target.value)}>
            {[5,10,15,20].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Sortieren</label>
          <select style={sel} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="score">Score</option>
            {WINDOWS.map(w=><option key={w} value={w}>{w}</option>)}
          </select>
        </div>
        <div style={{marginLeft:"auto",fontSize:10,color:"#334155",alignSelf:"flex-end",paddingBottom:2}}>
          {tableData.length} Ticker geladen
        </div>
      </div>

      {/* Legende */}
      <TableLegend />

      {/* Tabelle */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginBottom:12,overflowX:"auto"}}>
        <div style={{minWidth:460}}>
          <div style={{display:"grid",gridTemplateColumns:"22px 64px 56px repeat(5,1fr)",padding:"6px 10px",background:"#1e293b",gap:3,fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>
            <span>#</span><span>Ticker</span><span>Score</span>
            {WINDOWS.map(w=><span key={w} style={{textAlign:"center"}}>{w}</span>)}
          </div>
          {rows.map(item => {
            const rank = sorted.indexOf(item);
            const isTop = rank < topN;
            const isSelected = item.t === selected;
            const hasBroken = breakoutStatus[item.t] === true;
            const hasWaiting = breakoutStatus[item.t] === false;
            const statusEmoji = hasBroken ? "🔥" : hasWaiting ? "⏳" : null;
            return (
              <div key={item.t}
                onClick={() => item.hasOhlcv && setSelected(item.t)}
                style={{
                  display:"grid",gridTemplateColumns:"22px 64px 56px repeat(5,1fr)",
                  padding:"6px 10px",gap:3,
                  borderTop:"1px solid #0a0f1e",
                  background: isSelected ? "#1a2f4a" : isTop ? (rank%2===0?"#0d1526":"#0a1020") : "#07090f",
                  opacity: isTop ? 1 : 0.25,
                  alignItems:"center",
                  cursor: item.hasOhlcv ? "pointer" : "default",
                  borderLeft: isSelected ? "2px solid #3b82f6" : "2px solid transparent",
                }}>
                <span style={{fontSize:10,fontWeight:700,color:rank===0?"#f59e0b":rank<3?"#94a3b8":"#334155"}}>{rank+1}</span>
                <span style={{fontWeight:700,fontSize:11,fontFamily:"monospace",color:rank===0?"#fbbf24":isTop?"#f1f5f9":"#475569",display:"flex",alignItems:"center",gap:3}}>
                  {item.t}
                  {statusEmoji && <span style={{fontSize:10}}>{statusEmoji}</span>}
                  {item.hasOhlcv && !statusEmoji && <span style={{fontSize:8,color:"#334155"}}>▸</span>}
                </span>
                <span style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color:item.s>0?"#4ade80":"#f87171"}}>
                  {item.s>0?"+":""}{item.s}
                </span>
                {WINDOWS.map(w=>(
                  <div key={w} style={{textAlign:"center"}}><Cell v={item.w[w]}/></div>
                ))}
              </div>
            );
          })}
          {!showAll && sorted.length > rows.length && (
            <div style={{textAlign:"center",padding:"8px",borderTop:"1px solid #0a0f1e"}}>
              <button onClick={()=>setShowAll(true)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                Alle {tableData.length} ↓
              </button>
            </div>
          )}
        </div>
      </div>

      {/* Portfolio Top N */}
      <div style={{background:"#0f172a",borderRadius:10,padding:12,border:"1px solid #1e293b",marginBottom:12}}>
        <p style={{margin:"0 0 6px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Portfolio · Top {topN}</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {sorted.slice(0,topN).map((d,i)=>(
            <span key={d.t}
              onClick={() => d.hasOhlcv && setSelected(d.t)}
              style={{
                background:i<3?"#1a2f4a":"#1e293b",
                border:`1px solid ${d.t===selected?"#3b82f6":i<3?"#2563eb":"#334155"}`,
                borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,
                color:i<3?"#93c5fd":"#94a3b8",fontFamily:"monospace",
                cursor:d.hasOhlcv?"pointer":"default"
              }}>
              {d.t}
              {breakoutStatus[d.t]===true && <span style={{fontSize:9,marginLeft:2}}>🔥</span>}
              {breakoutStatus[d.t]===false && <span style={{fontSize:9,marginLeft:2}}>⏳</span>}
            </span>
          ))}
        </div>
      </div>

      {/* Struktur-Panel */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:11,fontWeight:700,color:"#f1f5f9"}}>📊 Daily Struktur · {selected}</p>
          {selectedEntry && (
            <span style={{fontSize:11,fontFamily:"monospace",color:selectedEntry.score>0?"#4ade80":"#f87171"}}>
              RS Score: {selectedEntry.score>0?"+":""}{selectedEntry.score}
            </span>
          )}
        </div>

        {ohlcv && structure ? (
          <>
            {/* Status-Badges */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{
                background: structure.broken ? "#052e16" : "#1c1108",
                border: `1px solid ${structure.broken ? "#22c55e" : "#f59e0b"}`,
                color: structure.broken ? "#4ade80" : "#fbbf24",
                borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600
              }}>
                {structure.broken ? "🔥 Downmove-Hoch gebrochen" : "⏳ Warte auf Breakout über Downmove-Hoch"}
              </span>
              <span style={{background:"#0d1526",border:"1px solid #1e3a5f",color:"#93c5fd",borderRadius:5,padding:"3px 8px",fontSize:11}}>
                Trend: {structure.trend === "bullish" ? "↗ Bullish" : structure.trend === "bearish" ? "↘ Bearish" : "→ Neutral"}
              </span>
              {structure.setup && structure.retracementHigh && !structure.retracementBroken && (
                <span style={{background:"#1a2f4a",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600}}>
                  ⚡ Setup: Warte auf Bruch des 4H-Retracement-Hochs
                </span>
              )}
              {structure.retracementBroken && (
                <span style={{background:"#052e16",border:"1px solid #22c55e",color:"#4ade80",borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:600}}>
                  ✅ Retracement-Hoch gebrochen → Entry aktiv
                </span>
              )}
            </div>

            {/* Key Levels – klar beschriftet */}
            <div style={{
              marginBottom:12,padding:"8px 12px",
              background:"#07090f",borderRadius:6,border:"1px solid #1a2235",
              display:"flex",gap:0,flexWrap:"wrap",fontSize:11,flexDirection:"column"
            }}>
              <div style={{fontWeight:700,color:"#475569",marginBottom:5,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>Key Levels</div>
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                {structure.lastDownmoveHigh && (
                  <span>
                    <span style={{color:"#64748b"}}>🟡 Downmove-Hoch: </span>
                    <span style={{fontFamily:"monospace",fontWeight:700,color:structure.broken?"#4ade80":"#f59e0b"}}>
                      ${structure.lastDownmoveHigh.price.toFixed(2)}
                    </span>
                    <span style={{color:"#334155",marginLeft:4,fontSize:10}}>({structure.lastDownmoveHigh.date})</span>
                    {structure.broken && (
                      <span style={{color:"#4ade80",marginLeft:4}}>✓ gebrochen</span>
                    )}
                  </span>
                )}
                {structure.retracementHigh && (
                  <span>
                    <span style={{color:"#64748b"}}>🔵 Retracement-Hoch (4H-Entry): </span>
                    <span style={{fontFamily:"monospace",fontWeight:700,color:"#60a5fa"}}>
                      ${structure.retracementHigh.price.toFixed(2)}
                    </span>
                    <span style={{color:"#334155",marginLeft:4,fontSize:10}}>({structure.retracementHigh.date})</span>
                    {structure.retracementBroken
                      ? <span style={{color:"#4ade80",marginLeft:4}}>✓ gebrochen</span>
                      : <span style={{color:"#3b82f6",marginLeft:4}}>→ Entry bei Bruch</span>
                    }
                  </span>
                )}
                <span>
                  <span style={{color:"#64748b"}}>Aktuell: </span>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:"#f1f5f9"}}>${structure.currentClose.toFixed(2)}</span>
                  {structure.retracementHigh && !structure.retracementBroken && (
                    <span style={{color:"#334155",marginLeft:6,fontSize:10}}>
                      ({((structure.retracementHigh.price/structure.currentClose-1)*100).toFixed(1)}% bis Entry-Level)
                    </span>
                  )}
                  {structure.retracementBroken && (
                    <span style={{color:"#4ade80",marginLeft:6}}>
                      +{((structure.currentClose/structure.retracementHigh.price-1)*100).toFixed(1)}% über Entry
                    </span>
                  )}
                </span>
              </div>
            </div>

            {/* Chart */}
            <CandleChart ohlcv={ohlcv} structure={structure}/>

            {/* Erklärung der Legende Struktur-Panel */}
            <div style={{marginTop:10,padding:"7px 10px",background:"#07090f",borderRadius:6,border:"1px solid #1a2235",fontSize:10,color:"#475569",lineHeight:1.7}}>
              <strong style={{color:"#334155"}}>Legende Strukturanalyse:</strong>
              {"  "}
              <span style={{color:"#f59e0b"}}>— Gelb gestrichelt</span> = Downmove-Hoch (letztes Swing-Hoch vor dem Rücksetzer, das der Kurs überwinden muss).{"  "}
              <span style={{color:"#22c55e"}}>— Grün</span> = Bereits gebrochen (Breakout bestätigt).{"  "}
              <span style={{color:"#3b82f6"}}>— Blau gestrichelt</span> = Retracement-Hoch nach dem Breakout (letztes Swing-Hoch im Rücksetzer, Entry-Signal bei Bruch).
            </div>

            {/* Setup-Notiz für ARM */}
            {selected === "ARM" && (
              <div style={{marginTop:8,padding:"8px 10px",background:"#0d1526",borderRadius:6,border:"1px solid #1e3a5f",fontSize:11,color:"#93c5fd",lineHeight:1.6}}>
                <strong>ARM Setup-Status:</strong> Daily-Hoch des Downmoves (~143.9$) wurde am 25. März stark gebrochen (+16% Kerze).
                Kurs läuft aktuell im 4H-Retracement zurück. Entry: Letztes Hoch des 4H-Retracements (blaue Linie) abwarten → bei Bruch einsteigen.
              </div>
            )}
          </>
        ) : (
          <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>
            {tableData.some(d => d.hasOhlcv)
              ? <>Klick auf einen Ticker mit 🔥 oder ⏳ für Strukturanalyse.</>
              : <>Lade rs_full.json aus dem gleichen Verzeichnis für vollständige OHLCV-Daten.<br/>
                  <span style={{fontSize:10,marginTop:4,display:"block",color:"#334155"}}>
                    Tipp: Python-Script ausführen → rs_full.json neben index.html auf GitHub hochladen
                  </span>
                </>
            }
          </div>
        )}
      </div>

      {/* Workflow-Hinweis */}
