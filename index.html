<!DOCTYPE html>
<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS · QQQ Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select, button { outline: none; }
    .chart-wrap { position: relative; }
    .chart-wrap svg { display: block; }
    @keyframes redGlow { 0%,100%{box-shadow:0 0 6px #ef444455} 50%{box-shadow:0 0 16px #ef4444aa} }
    .red-glow { animation: redGlow 1.3s ease-in-out infinite; }
    @keyframes flamePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.75;transform:scale(1.2)} }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useCallback, useEffect } = React;

// ── Marktstruktur: HH / HL / LH / LL ─────────────────────────────────────────
function detectMarketStructure(ohlcv, period = 2) {
  if (!ohlcv || ohlcv.length < 8) return { points: [], trend: 'neutral' };
  const n = ohlcv.length;

  // Rohe Pivot-Punkte
  const raw = [];
  for (let i = period; i < n - period; i++) {
    let isH = true, isL = true;
    for (let j = 1; j <= period; j++) {
      if (ohlcv[i].h < ohlcv[i-j].h || ohlcv[i].h < ohlcv[i+j].h) isH = false;
      if (ohlcv[i].l > ohlcv[i-j].l || ohlcv[i].l > ohlcv[i+j].l) isL = false;
    }
    if (isH) raw.push({ idx: i, type: 'high', price: ohlcv[i].h, date: ohlcv[i].d });
    if (isL) raw.push({ idx: i, type: 'low',  price: ohlcv[i].l, date: ohlcv[i].d });
  }
  raw.sort((a, b) => a.idx - b.idx);

  // Alternierendes Zigzag (aufeinanderfolgende gleiche Typen → extremeren behalten)
  const zz = [];
  for (const p of raw) {
    const last = zz[zz.length - 1];
    if (!last || last.type !== p.type) {
      zz.push({ ...p });
    } else {
      if ((p.type === 'high' && p.price > last.price) ||
          (p.type === 'low'  && p.price < last.price)) {
        zz[zz.length - 1] = { ...p };
      }
    }
  }

  // Label: HH/LH für Hochs, HL/LL für Tiefs
  const labeled = [];
  let lastH = null, lastL = null;
  for (const p of zz) {
    if (p.type === 'high') {
      const label = lastH === null ? 'HH' : p.price > lastH.price ? 'HH' : 'LH';
      const pt = { ...p, label, up: label === 'HH' };
      labeled.push(pt); lastH = pt;
    } else {
      const label = lastL === null ? 'LL' : p.price < lastL.price ? 'LL' : 'HL';
      const pt = { ...p, label, up: label === 'HL' };
      labeled.push(pt); lastL = pt;
    }
  }

  // Trend aus letzten Strukturpunkten
  const lastHH = [...labeled].reverse().find(p => p.label === 'HH');
  const lastLL = [...labeled].reverse().find(p => p.label === 'LL');
  const lastHL = [...labeled].reverse().find(p => p.label === 'HL');
  const lastLH = [...labeled].reverse().find(p => p.label === 'LH');

  let trend = 'neutral';
  if (lastHH && lastLL) trend = lastHH.idx > lastLL.idx ? 'up' : 'down';
  else if (lastHH) trend = 'up';
  else if (lastLL) trend = 'down';

  // Trendwechsel: Close bricht letzten LH (Downtrend → Up) oder letzten HL (Uptrend → Down)
  const lastClose = ohlcv[n - 1].c;
  if (trend === 'down' && lastLH && lastClose > lastLH.price) trend = 'up';
  else if (trend === 'up' && lastHL && lastClose < lastHL.price) trend = 'down';

  return { points: labeled, trend, lastLH, lastHL };
}

// ── Weekly Candlestick Chart ───────────────────────────────────────────────
function ChartWeekly({ ohlcvW, structure, chartId }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const W = 600, H = 260;
  const PL = 56, PR = 52, PT = 18, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;
  const n = ohlcvW.length;
  const allH = ohlcvW.map(d => d.h), allL = ohlcvW.map(d => d.l);
  const rawMax = Math.max(...allH), rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.07;
  const maxP = rawMax + pad, minP = rawMin - pad, range = maxP - minP;
  const toY = p => PT + (1 - (p - minP) / range) * cH;
  const toX = i => PL + (i + 0.5) * (cW / n);
  const bW  = Math.max(2, cW / n * 0.65);

  const yTicks = [];
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * range / 5);

  // Monats-Labels für Weekly
  const monthLabels = [];
  let lastMonth = null;
  ohlcvW.forEach((d, i) => {
    const m = d.d.slice(0, 7);
    if (m !== lastMonth) { monthLabels.push({ i, label: d.d.slice(5,7)+"/"+d.d.slice(2,4) }); lastMonth = m; }
  });

  const swingPoints = (structure?.points || []).filter(p => p.idx >= 0 && p.idx < n);

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.round((mx - PL) / (cW / n) - 0.5);
    setHover(idx >= 0 && idx < n ? idx : null);
  }, [n, cW]);

  const hd = hover !== null ? ohlcvW[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      <div style={{height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,background:"#0a0f1e",borderBottom:"1px solid #1e293b",fontSize:10,fontFamily:"monospace"}}>
        {hd ? <>
          <span style={{color:"#475569"}}>{hd.d}</span>
          <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
          <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
          <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
          <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
          <span style={{color:"#475569",marginLeft:"auto"}}>{hd.c>=hd.o?"▲":"▼"} {((hd.c-hd.o)/hd.o*100).toFixed(2)}%</span>
        </> : <span style={{color:"#334155"}}>Hover für Weekly-Details</span>}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)} style={{cursor:"crosshair"}}>
        <rect x={PL} y={PT} width={cW} height={cH} fill="#07090f"/>

        {/* Gitter */}
        {yTicks.map((val, k) => {
          const y = toY(val);
          return <g key={k}>
            <line x1={PL} x2={PL+cW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
            <text x={PL-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">{val.toFixed(0)}</text>
          </g>;
        })}

        {/* Monatstrennlinien */}
        {monthLabels.map(({i, label}) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,4" opacity="0.25"/>
            <text x={toX(i)} y={PT+cH+14} textAnchor="middle" fill="#334155" fontSize="8.5" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Kerzen */}
        {ohlcvW.map((d, i) => {
          const bull = d.c >= d.o;
          const col  = bull ? "#22c55e" : "#ef4444";
          const bTop = toY(Math.max(d.o, d.c));
          const bH   = Math.max(1.5, toY(Math.min(d.o, d.c)) - bTop);
          const isHov = hover === i;
          return <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={toY(d.h)} y2={toY(d.l)} stroke={col} strokeWidth={isHov?1.5:1} opacity={0.9}/>
            <rect x={toX(i)-bW/2} y={bTop} width={bW} height={bH} fill={col} opacity={isHov?0.95:0.8}/>
          </g>;
        })}

        {/* Swing-Struktur Dreiecke */}
        {swingPoints.map((p, k) => {
          const cx = toX(p.idx);
          const col = p.up ? "#22c55e" : "#ef4444";
          if (p.type === 'high') {
            const cy = toY(ohlcvW[p.idx].h) - 3;
            return <g key={k}>
              <polygon points={`${cx},${cy-7} ${cx-4},${cy} ${cx+4},${cy}`} fill={col} opacity={0.9}/>
              <text x={cx} y={cy-9} textAnchor="middle" fill={col} fontSize="6.5" fontFamily="monospace" opacity={0.85}>{p.label}</text>
            </g>;
          } else {
            const cy = toY(ohlcvW[p.idx].l) + 3;
            return <g key={k}>
              <polygon points={`${cx},${cy+7} ${cx-4},${cy} ${cx+4},${cy}`} fill={col} opacity={0.9}/>
              <text x={cx} y={cy+16} textAnchor="middle" fill={col} fontSize="6.5" fontFamily="monospace" opacity={0.85}>{p.label}</text>
            </g>;
          }
        })}

        {/* Aktueller Preis */}
        <line x1={PL} x2={PL+cW} y1={toY(ohlcvW[n-1].c)} y2={toY(ohlcvW[n-1].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.45"/>
        <rect x={PL+cW+2} y={toY(ohlcvW[n-1].c)-8} width={46} height={15} rx="3" fill="#1e293b"/>
        <text x={PL+cW+25} y={toY(ohlcvW[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcvW[n-1].c.toFixed(2)}</text>

        {/* Crosshair */}
        {hover !== null && <>
          <line x1={toX(hover)} x2={toX(hover)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <line x1={PL} x2={PL+cW} y1={toY(ohlcvW[hover].c)} y2={toY(ohlcvW[hover].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <rect x={PL-52} y={toY(ohlcvW[hover].c)-8} width={48} height={15} rx="3" fill="#1e293b"/>
          <text x={PL-28} y={toY(ohlcvW[hover].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{ohlcvW[hover].c.toFixed(2)}</text>
        </>}
        <rect x={PL} y={PT} width={cW} height={cH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      <div style={{padding:"5px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="12" height="12"><polygon points="6,0 0,10 12,10" fill="#22c55e"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>HH / HL</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="12" height="12"><polygon points="6,10 0,0 12,0" fill="#ef4444"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>LH / LL</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>{ohlcvW.length} Wochen · Weekly · Trend: <span style={{color:structure?.trend==='up'?"#22c55e":structure?.trend==='down'?"#ef4444":"#64748b",fontWeight:700}}>{structure?.trend==='up'?'▲ Up':structure?.trend==='down'?'▼ Down':'–'}</span></div>
      </div>
    </div>
  );
}

// ── 4H Candlestick Chart (60 Kerzen) ─────────────────────────────────────────
function Chart4H({ ohlcv4h, structure, chartId }) {
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const W = 600, H = 260;
  const PL = 56, PR = 52, PT = 18, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;

  // Letzte 60 Kerzen anzeigen
  const display4h = useMemo(() => ohlcv4h.slice(-60), [ohlcv4h]);
  const n = display4h.length;

  const allH = display4h.map(d => d.h), allL = display4h.map(d => d.l);
  const rawMax = Math.max(...allH), rawMin = Math.min(...allL);
  const pad = (rawMax - rawMin) * 0.07;
  const maxP = rawMax + pad, minP = rawMin - pad, range = maxP - minP;
  const toY = p => PT + (1 - (p - minP) / range) * cH;
  const toX = i => PL + (i + 0.5) * (cW / n);
  const bW  = Math.max(1.5, cW / n * 0.65);

  const yTicks = [];
  for (let k = 0; k <= 5; k++) yTicks.push(minP + k * range / 5);

  const dayLabels = [];
  let lastDay = null;
  display4h.forEach((d, i) => {
    const day = d.d.slice(0, 10);
    if (day !== lastDay && i % 2 === 0) { dayLabels.push({ i, label: d.d.slice(5, 10) }); lastDay = day; }
  });

  // Offset für Struktur-Indizes (da wir nur die letzten 60 anzeigen)
  const offset = ohlcv4h.length - display4h.length;
  const swingPoints = (structure?.points || [])
    .map(p => ({ ...p, localIdx: p.idx - offset }))
    .filter(p => p.localIdx >= 0 && p.localIdx < n);

  const handleMouseMove = useCallback((e) => {
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.round((mx - PL) / (cW / n) - 0.5);
    setHover(idx >= 0 && idx < n ? idx : null);
  }, [n, cW]);

  const hd = hover !== null ? display4h[hover] : null;

  return (
    <div className="chart-wrap" style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",overflow:"hidden"}}>
      <div style={{height:28,padding:"0 12px",display:"flex",alignItems:"center",gap:14,background:"#0a0f1e",borderBottom:"1px solid #1e293b",fontSize:10,fontFamily:"monospace"}}>
        {hd ? <>
          <span style={{color:"#475569"}}>{hd.d}</span>
          <span>O <span style={{color:"#e2e8f0"}}>{hd.o.toFixed(2)}</span></span>
          <span>H <span style={{color:"#4ade80"}}>{hd.h.toFixed(2)}</span></span>
          <span>L <span style={{color:"#f87171"}}>{hd.l.toFixed(2)}</span></span>
          <span>C <span style={{color:hd.c>=hd.o?"#4ade80":"#f87171",fontWeight:700}}>{hd.c.toFixed(2)}</span></span>
        </> : <span style={{color:"#334155"}}>Hover für 4H-Details</span>}
      </div>

      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)} style={{cursor:"crosshair"}}>
        <rect x={PL} y={PT} width={cW} height={cH} fill="#07090f"/>

        {yTicks.map((val, k) => {
          const y = toY(val);
          return <g key={k}>
            <line x1={PL} x2={PL+cW} y1={y} y2={y} stroke="#1a2235" strokeWidth="0.8"/>
            <text x={PL-5} y={y+3.5} textAnchor="end" fill="#334155" fontSize="9" fontFamily="monospace">{val.toFixed(0)}</text>
          </g>;
        })}

        {/* Tagestrennlinien */}
        {dayLabels.map(({i, label}) => (
          <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,4" opacity="0.25"/>
            <text x={toX(i)} y={PT+cH+14} textAnchor="middle" fill="#334155" fontSize="8" fontFamily="monospace">{label}</text>
          </g>
        ))}

        {/* Kerzen 4H */}
        {display4h.map((d, i) => {
          const bull = d.c >= d.o;
          const col  = bull ? "#22c55e" : "#ef4444";
          const bTop = toY(Math.max(d.o, d.c));
          const bH   = Math.max(1, toY(Math.min(d.o, d.c)) - bTop);
          const isHov = hover === i;
          return <g key={i}>
            <line x1={toX(i)} x2={toX(i)} y1={toY(d.h)} y2={toY(d.l)} stroke={col} strokeWidth={isHov?1.5:0.8} opacity={0.85}/>
            <rect x={toX(i)-bW/2} y={bTop} width={bW} height={bH} fill={col} opacity={isHov?0.95:0.75}/>
          </g>;
        })}

        {/* Swing-Struktur Dreiecke */}
        {swingPoints.map((p, k) => {
          const cx = toX(p.localIdx);
          const col = p.up ? "#22c55e" : "#ef4444";
          if (p.type === 'high') {
            const cy = toY(display4h[p.localIdx].h) - 3;
            return <g key={k}>
              <polygon points={`${cx},${cy-7} ${cx-4},${cy} ${cx+4},${cy}`} fill={col} opacity={0.9}/>
              <text x={cx} y={cy-9} textAnchor="middle" fill={col} fontSize="6.5" fontFamily="monospace" opacity={0.85}>{p.label}</text>
            </g>;
          } else {
            const cy = toY(display4h[p.localIdx].l) + 3;
            return <g key={k}>
              <polygon points={`${cx},${cy+7} ${cx-4},${cy} ${cx+4},${cy}`} fill={col} opacity={0.9}/>
              <text x={cx} y={cy+16} textAnchor="middle" fill={col} fontSize="6.5" fontFamily="monospace" opacity={0.85}>{p.label}</text>
            </g>;
          }
        })}

        {/* Aktueller Preis */}
        <line x1={PL} x2={PL+cW} y1={toY(display4h[n-1].c)} y2={toY(display4h[n-1].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.45"/>
        <rect x={PL+cW+2} y={toY(display4h[n-1].c)-8} width={46} height={15} rx="3" fill="#1e293b"/>
        <text x={PL+cW+25} y={toY(display4h[n-1].c)+3} textAnchor="middle" fill="#94a3b8" fontSize="8.5" fontFamily="monospace">{display4h[n-1].c.toFixed(2)}</text>

        {/* Crosshair */}
        {hover !== null && <>
          <line x1={toX(hover)} x2={toX(hover)} y1={PT} y2={PT+cH} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
          <line x1={PL} x2={PL+cW} y1={toY(display4h[hover].c)} y2={toY(display4h[hover].c)} stroke="#7dd3fc" strokeWidth="0.7" strokeDasharray="2,3" opacity="0.5"/>
        </>}
        <rect x={PL} y={PT} width={cW} height={cH} fill="none" stroke="#1e293b" strokeWidth="0.8"/>
      </svg>

      <div style={{padding:"5px 12px",display:"flex",gap:14,alignItems:"center",background:"#0a0f1e",borderTop:"1px solid #0f172a",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="12" height="12"><polygon points="6,0 0,10 12,10" fill="#22c55e"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>HH / HL</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <svg width="12" height="12"><polygon points="6,10 0,0 12,0" fill="#ef4444"/></svg>
          <span style={{fontSize:9,color:"#64748b"}}>LH / LL</span>
        </div>
        <div style={{marginLeft:"auto",fontSize:9,color:"#334155",fontFamily:"monospace"}}>{n} Kerzen · 4H · Trend: <span style={{color:structure?.trend==='up'?"#22c55e":structure?.trend==='down'?"#ef4444":"#64748b",fontWeight:700}}>{structure?.trend==='up'?'▲ Up':structure?.trend==='down'?'▼ Down':'–'}</span></div>
      </div>
    </div>
  );
}

// ── Hilfskomponenten ───────────────────────────────────────────────────────
const WINDOWS = ["5T","10T","20T","50T","6M"];

function Cell({ v }) {
  if (v == null) return <span style={{color:"#334155"}}>—</span>;
  return <span style={{color:v>0?"#4ade80":"#f87171",fontFamily:"monospace",fontSize:11}}>{v>0?"+":""}{Math.round(v)}</span>;
}

// ── W/D/4H Breach-Punkte Spalten ───────────────────────────────────────────
function BreachDots({ structW, structD, struct4H }) {
  const dot = (active) => (
    <span style={{
      display:"inline-block", width:7, height:7, borderRadius:"50%",
      background: active ? "#4ade80" : "#1e293b",
      border: active ? "1px solid #22c55e" : "1px solid #334155",
      flexShrink: 0,
    }}/>
  );
  const col = { display:"flex", alignItems:"center", justifyContent:"center", width:18 };
  return (
    <div style={{display:"flex", gap:1, alignItems:"center"}}>
      <div style={col}>{dot(structW?.trend === 'up')}</div>
      <div style={col}>{dot(structD?.trend === 'up')}</div>
      <div style={col}>{dot(struct4H?.trend === 'up')}</div>
    </div>
  );
}

// ── Haupt-App ──────────────────────────────────────────────────────────────
function App() {
  const [data, setData]         = useState(null);
  const [error, setError]       = useState(null);
  const [sortBy, setSortBy]     = useState("score");
  const [showAll, setShowAll]   = useState(false);
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    fetch("rs_full.json")
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(json => {
        // Beide Formate unterstützen: Array (alt) und Objekt mit data-Key (neu)
        const arr = Array.isArray(json) ? json : json.data;
        // Letztes Datum aus den täglichen Kerzen ableiten (zuverlässiger als timestamp-Feld)
        const lastDate = arr.reduce((best, d) => {
          const last = d.ohlcv?.[d.ohlcv.length - 1]?.d;
          return last > best ? last : best;
        }, "");
        const normalized = {
          timestamp: lastDate || (Array.isArray(json) ? "–" : json.timestamp),
          benchmark: "QQQ",
          top20: arr.slice(0, 20).map(d => d.ticker),
          data: arr
        };
        setData(normalized);
        const first = normalized.data.find(d => d.ohlcv?.length > 0);
        if (first) setSelected(first.ticker);
      })
      .catch(e => setError(e.message));
  }, []);

  const rsData = useMemo(() => {
    if (!data) return [];
    return data.data.map(d => ({ t: d.ticker, s: d.score, w: d.windows }));
  }, [data]);

  const sorted = useMemo(() =>
    [...rsData].sort((a, b) =>
      sortBy === "score" ? b.s - a.s : (b.w[sortBy]??-999) - (a.w[sortBy]??-999)
    ), [rsData, sortBy]);

  const rows = showAll ? sorted : sorted.slice(0, 20);

  // Weekly OHLCV
  const ohlcvW = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv_w?.length > 0 ? entry.ohlcv_w : null;
  }, [data, selected]);

  // Daily OHLCV
  const ohlcv = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv?.length > 0 ? entry.ohlcv : null;
  }, [data, selected]);

  // 4H OHLCV: nur echte Daten
  const ohlcv4h = useMemo(() => {
    if (!data || !selected) return null;
    const entry = data.data.find(d => d.ticker === selected);
    return entry?.ohlcv_4h?.length > 0 ? entry.ohlcv_4h : null;
  }, [data, selected]);

  const structureW  = useMemo(() => detectMarketStructure(ohlcvW), [ohlcvW]);
  const structure   = useMemo(() => detectMarketStructure(ohlcv), [ohlcv]);
  const structure4h = useMemo(() => detectMarketStructure(ohlcv4h), [ohlcv4h]);

  // Struktur ALLER Ticker (für Badges und Breach-Punkte in Tabelle)
  const structureMap = useMemo(() => {
    if (!data) return {};
    const map = {};
    data.data.forEach(entry => {
      const d = map[entry.ticker] = {};
      if (entry.ohlcv?.length > 0)    d.daily  = detectMarketStructure(entry.ohlcv);
      if (entry.ohlcv_w?.length > 0)  d.weekly = detectMarketStructure(entry.ohlcv_w);
      if (entry.ohlcv_4h?.length > 0) d.h4     = detectMarketStructure(entry.ohlcv_4h);
    });
    return map;
  }, [data]);

  // 4H Chart: immer anzeigen wenn Daten vorhanden
  const show4H = ohlcv4h && ohlcv4h.length > 0;

  const selectedRs = rsData.find(d => d.t === selected);
  const top20      = data?.top20 ?? [];

  const sel = {
    background:"#1e293b", border:"1px solid #334155",
    color:"#e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:12, cursor:"pointer"
  };

  if (error) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#f87171",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:18}}>⚠ Fehler beim Laden</span>
      <span style={{fontSize:12,color:"#475569"}}>{error}</span>
      <span style={{fontSize:11,color:"#334155"}}>Stelle sicher, dass rs_full.json im selben Verzeichnis liegt.</span>
    </div>
  );
  if (!data) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060b14",color:"#475569",fontFamily:"monospace",flexDirection:"column",gap:8}}>
      <span style={{fontSize:24}}>⟳</span>
      <span style={{fontSize:12}}>Lade rs_full.json …</span>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060b14",color:"#e2e8f0",fontFamily:"'Inter',system-ui,sans-serif",padding:"16px 12px"}}>

      {/* Header */}
      <div style={{marginBottom:14}}>
        <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#f8fafc"}}>⚡ RS · QQQ</h1>
        <p style={{margin:"2px 0 0",color:"#475569",fontSize:11}}>
          Outperformance vs. Nasdaq 100 · {data.timestamp}
          {(() => {
            const last = new Date(data.timestamp);
            const diffDays = (Date.now() - last) / 86400000;
            const ok = !isNaN(diffDays) && diffDays <= 5;
            return <span title={ok ? "Daten aktuell" : "Daten veraltet"} style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:ok?"#22c55e":"#ef4444",marginLeft:5,verticalAlign:"middle"}}/>;
          })()}
        </p>
      </div>

      {/* Steuerung */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Sortieren</label>
          <select style={sel} value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="score">Score</option>
            {WINDOWS.map(w => <option key={w} value={w}>{w}</option>)}
          </select>
        </div>
      </div>

      {/* RS-Tabelle */}
      {/* Spalten: # | Ticker | Score | W D 4H (3 Punkte-Spalten eng) | 5T 10T 20T 50T 6M */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginBottom:12,overflowX:"auto"}}>
        <div style={{minWidth:480}}>
          {/* Header-Zeile */}
          <div style={{
            display:"grid",
            gridTemplateColumns:"22px 58px 56px 18px 18px 18px repeat(5,1fr)",
            padding:"6px 10px", background:"#1e293b", gap:2,
            fontSize:9, color:"#475569", textTransform:"uppercase", letterSpacing:0.5,
            alignItems:"center"
          }}>
            <span>#</span>
            <span>Ticker</span>
            <span>Score</span>
            <span style={{textAlign:"center",color:"#f59e0b"}}>W</span>
            <span style={{textAlign:"center",color:"#ef4444"}}>D</span>
            <span style={{textAlign:"center",color:"#a78bfa"}}>4H</span>
            {WINDOWS.map(w => <span key={w} style={{textAlign:"center"}}>{w}</span>)}
          </div>

          {rows.map(item => {
            const rank       = sorted.indexOf(item);
            const isTop      = rank < 20;
            const hasChart   = data.data.find(d=>d.ticker===item.t)?.ohlcv?.length > 0;
            const structs    = structureMap[item.t] || {};
            const isBOC      = structs.daily?.trend === 'up';

            return (
              <div key={item.t}
                onClick={() => hasChart && setSelected(item.t)}
                style={{
                  display:"grid",
                  gridTemplateColumns:"22px 58px 56px 18px 18px 18px repeat(5,1fr)",
                  padding:"6px 10px", gap:2,
                  borderTop:`1px solid ${isBOC?"#ef444422":"#0a0f1e"}`,
                  background: isBOC
                    ? (item.t===selected?"#3a0808":"#160303")
                    : item.t===selected ? "#1a2f4a"
                    : isTop ? (rank%2===0?"#0d1526":"#0a1020") : "#07090f",
                  opacity: isTop ? 1 : (isBOC ? 0.85 : 0.25),
                  alignItems:"center",
                  cursor: hasChart ? "pointer" : "default",
                  borderLeft: isBOC ? "2px solid #ef4444"
                    : item.t===selected ? "2px solid #3b82f6" : "2px solid transparent",
                }}>
                <span style={{fontSize:10,fontWeight:700,color:rank===0?"#f59e0b":rank<3?"#94a3b8":"#334155"}}>{rank+1}</span>
                {/* Ticker-Zelle: Feuer vor dem Namen, kein extra Signal */}
                <span style={{fontWeight:700,fontSize:11,fontFamily:"monospace",
                  color:isBOC?"#fca5a5":rank===0?"#fbbf24":isTop?"#f1f5f9":"#475569",
                  display:"flex",alignItems:"center",gap:2}}>
                  {isBOC && <span className="flame-anim" style={{fontSize:11}}>🔥</span>}
                  {item.t}
                  {hasChart && <span style={{fontSize:8,color:"#334155",marginLeft:2}}>▸</span>}
                </span>
                <span style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color:item.s>0?"#4ade80":"#f87171"}}>
                  {item.s>0?"+":""}{Math.round(item.s)}
                </span>
                {/* W-Breach Punkt */}
                <div style={{display:"flex",justifyContent:"center"}}>
                  <span style={{
                    display:"inline-block", width:7, height:7, borderRadius:"50%",
                    background: structs.weekly?.trend === 'up' ? "#4ade80" : "transparent",
                    border: structs.weekly?.trend === 'up' ? "1px solid #22c55e" : "1px solid #1e293b",
                  }}/>
                </div>
                {/* D-Breach Punkt */}
                <div style={{display:"flex",justifyContent:"center"}}>
                  <span style={{
                    display:"inline-block", width:7, height:7, borderRadius:"50%",
                    background: structs.daily?.trend === 'up' ? "#4ade80" : "transparent",
                    border: structs.daily?.trend === 'up' ? "1px solid #22c55e" : "1px solid #1e293b",
                  }}/>
                </div>
                {/* 4H-Breach Punkt */}
                <div style={{display:"flex",justifyContent:"center"}}>
                  <span style={{
                    display:"inline-block", width:7, height:7, borderRadius:"50%",
                    background: structs.h4?.trend === 'up' ? "#4ade80" : "transparent",
                    border: structs.h4?.trend === 'up' ? "1px solid #22c55e" : "1px solid #1e293b",
                  }}/>
                </div>
                {WINDOWS.map(w => (
                  <div key={w} style={{textAlign:"center"}}><Cell v={item.w[w]}/></div>
                ))}
              </div>
            );
          })}

          {/* Toggle Alle / Zurück auf Top 20 */}
          <div style={{textAlign:"center",padding:"8px",borderTop:"1px solid #0a0f1e"}}>
            {showAll ? (
              <button onClick={() => setShowAll(false)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                ↑ Zurück auf Top 20
              </button>
            ) : sorted.length > 20 ? (
              <button onClick={() => setShowAll(true)}
                style={{background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>
                Alle {rsData.length} anzeigen ↓
              </button>
            ) : null}
          </div>
        </div>
      </div>

      {/* Portfolio-Schnellauswahl */}
      <div style={{background:"#0f172a",borderRadius:10,padding:12,border:"1px solid #1e293b",marginBottom:12}}>
        <p style={{margin:"0 0 6px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Portfolio · Top 20</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {sorted.slice(0,20).map((d,i) => {
            const hasChart = data.data.find(e=>e.ticker===d.t)?.ohlcv?.length > 0;
            const isBOC   = structureMap[d.t]?.daily?.trend === 'up';
            return (
              <span key={d.t}
                onClick={()=>hasChart&&setSelected(d.t)}
                style={{
                  background:isBOC?"#160303":i<3?"#1a2f4a":"#1e293b",
                  border:`1px solid ${d.t===selected?"#3b82f6":isBOC?"#ef4444":i<3?"#2563eb":"#334155"}`,
                  borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:700,
                  color:isBOC?"#fca5a5":i<3?"#93c5fd":"#94a3b8",
                  fontFamily:"monospace", cursor:hasChart?"pointer":"default"
                }}>
                {isBOC&&"🔥"}{d.t}
              </span>
            );
          })}
        </div>
      </div>

      {/* Strukturanalyse */}
      <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:15,fontWeight:800,color:"#f1f5f9",fontFamily:"monospace"}}>{selected ?? "–"}</p>
          {selectedRs && (
            <span style={{fontSize:11,fontFamily:"monospace",color:selectedRs.s>0?"#4ade80":"#f87171"}}>
              RS Score: {selectedRs.s>0?"+":""}{Math.round(selectedRs.s)}
            </span>
          )}
        </div>

        {ohlcv ? (
          <>
            {/* Weekly Chart – immer angezeigt wenn Daten vorhanden */}
            {ohlcvW && structureW ? (
              <div>
                <ChartWeekly ohlcvW={ohlcvW} structure={structureW} chartId={selected+"_w"}/>
              </div>
            ) : (
              <div style={{background:"#07090f",borderRadius:8,border:"1px solid #1e293b",padding:"12px 16px",color:"#334155",fontSize:11,fontFamily:"monospace"}}>
                Weekly-Daten fehlen – bitte Python-Skript neu ausführen (ohlcv_w)
              </div>
            )}

            {/* Daily Chart – immer angezeigt */}
            {ohlcv && structure && (
              <div style={{marginTop:10}}>
                <CandleChart ohlcv={ohlcv} structure={structure} chartId={selected+"_d"}/>
              </div>
            )}

            {/* 4H Chart – immer angezeigt wenn Daten vorhanden */}
            {show4H && (
              <div style={{marginTop:10}}>
                <Chart4H ohlcv4h={ohlcv4h} structure={structure4h} chartId={selected+"_4h"}/>
              </div>
            )}
          </>
        ) : (
          <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>
            Klick auf einen Ticker mit ▸ für Strukturanalyse.
          </div>
        )}
      </div>

      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:8}}>
        Echte Daten via yfinance · Kein Handelssignal · Stand {data.timestamp}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
