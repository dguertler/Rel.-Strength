name: Breakout-Alarm (2→3 Punkte)

on:
  schedule:
    # Di–Sa 02:00 UTC – 03:00 Uhr MEZ (Winter) / 04:00 Uhr MESZ (Sommer)
    # Prüft jeweils die Kurse des Vortages (Mo–Fr)
    - cron: '0 2 * * 2-6'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test-Mail senden (ja/nein)'
        required: false
        default: 'nein'
        type: choice
        options: ['nein', 'ja']

jobs:
  check-alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas matplotlib

      - name: Alert-Skript ausführen
        env:
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO:   ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_TEST_MODE:  ${{ github.event.inputs.test_mode == 'ja' && 'true' || 'false' }}
        run: python check_alerts.py

      - name: Zustandsdatei committen
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add alerts_state.json
          git diff --staged --quiet || git commit -m "Alert-Zustand aktualisiert"
          git push origin main
