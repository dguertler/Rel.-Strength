name: Earnings-Überraschung (≥5% Kurssprung + ≥10% EPS-Beat)

on:
  schedule:
    # Di–Sa 01:00 UTC (03:00 MESZ) – nach RS-Updates (21:00/21:15 UTC) und vor Breakout-Alert (02:00 UTC)
    - cron: '0 1 * * 2-6'
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test-Datum (YYYY-MM-DD) – leer = gestern'
        required: false
        default: ''

jobs:
  check-earnings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas matplotlib

      - name: Earnings-Skript ausführen
        env:
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TEST_DATE:      ${{ github.event.inputs.test_date }}
        run: python check_earnings.py
