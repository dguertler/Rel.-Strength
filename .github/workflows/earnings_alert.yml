name: Earnings-Überraschung (≥5% Kurssprung + ≥10% EPS-Beat)

on:
  schedule:
    # Di–Sa 06:00 UTC – nachdem RS-Updates gelaufen sind (Mo–Fr)
    - cron: '0 6 * * 2-6'
  workflow_dispatch:

jobs:
  check-earnings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas matplotlib

      - name: Earnings-Skript ausführen
        env:
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python check_earnings.py
