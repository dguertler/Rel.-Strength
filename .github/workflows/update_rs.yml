name: NASDAQ100 Daten aktualisieren

on:
  schedule:
    - cron: '0 1 * * 2-6'    # Di-Sa 03:00 MESZ (01:00 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger']

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas lxml

      - name: Skript ausführen
        run: python rs_colab.py

      - name: JSON committen und pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rs_full.json
          git diff --staged --quiet || git commit -m "RS Daten aktualisiert"
          git push origin main

      - name: Fehler-Mail senden
        if: failure()
        env:
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          JOB_NAME:       "NASDAQ-Update (update_rs.yml)"
          RUN_URL:        "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: python notify_failure.py
