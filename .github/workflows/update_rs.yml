name: RS Daten aktualisieren

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Mo-Fr 23:00 Uhr DE (21 UTC)
    - cron: '0 4 * * 2-6'    # Di-Sa 06:00 Uhr DE (4 UTC)
    - cron: '30 8 * * 2-6'   # Di-Sa 10:30 Uhr DE (8:30 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger']       # Nur wenn /rs-update den Trigger-File pusht

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install "yfinance==0.2.54" "pandas==2.2.3"

      - name: Skript ausführen (bis zu 3 Versuche)
        run: |
          for attempt in 1 2 3; do
            echo "Versuch $attempt/3..."
            python rs_colab.py && break
            if [ $attempt -lt 3 ]; then
              echo "Fehlgeschlagen – warte 120s vor Wiederholung..."
              sleep 120
            else
              echo "Alle 3 Versuche fehlgeschlagen."
              exit 1
            fi
          done

      - name: JSON committen und pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rs_full.json rs_top20_history.json
          git diff --staged --quiet || git commit -m "RS Daten aktualisiert ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin main
          git push origin main
