name: RS Daten aktualisieren

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Mo-Fr 23:00 Uhr DE (21 UTC)
    - cron: '0 4 * * 2-6'    # Di-Sa 06:00 Uhr DE (4 UTC)
    - cron: '30 8 * * 2-6'   # Di-Sa 10:30 Uhr DE (8:30 UTC)
  workflow_dispatch:          # manueller Start per Knopfdruck

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas

      - name: Skript ausführen
        run: python rs_colab.py

      - name: JSON auf main pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          cp rs_full.json /tmp/rs_full.json
          git fetch origin main
          git checkout main
          cp /tmp/rs_full.json rs_full.json
          git add rs_full.json
          git diff --staged --quiet || git commit -m "RS Daten aktualisiert"
          git push origin main
