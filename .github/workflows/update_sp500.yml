name: S&P 500 Daten aktualisieren

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Mo-Fr 23:00 Uhr DE (21 UTC)
    - cron: '0 4 * * 2-6'    # Di-Sa 06:00 Uhr DE (4 UTC)
    - cron: '30 8 * * 2-6'   # Di-Sa 10:30 Uhr DE (8:30 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger-sp500']  # Manueller Trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas

      - name: S&P 500 Skript ausführen
        run: python sp500_colab.py

      - name: JSON committen und pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rs_sp500.json
          git diff --staged --quiet || git commit -m "S&P 500 Daten aktualisiert"
          git push origin main
