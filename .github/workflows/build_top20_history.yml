name: Top-20-Historie aufbauen (einmalig)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # vollständige Git-Historie nötig

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Skript ausführen
        run: python build_top20_history.py

      - name: Ergebnis committen und pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rs_top20_history.json
          git diff --staged --quiet || git commit -m "Top-20-Historie aufgebaut (backfill)"
          git push origin main
