name: Ticker-Liste aktualisieren (täglich)

on:
  schedule:
    - cron: '0 6 * * 1-5'   # Mo-Fr 08:00 Uhr DE (6 UTC) – vor den RS-Jobs
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install pandas lxml html5lib

      - name: Ticker-Check ausführen
        run: python update_tickers.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tickers_config.json
          git diff --staged --quiet || git commit -m "Ticker-Liste aktualisiert ($(date '+%Y-%m-%d'))"
          git push origin main
