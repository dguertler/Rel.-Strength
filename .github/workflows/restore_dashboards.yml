name: Restore Dashboards (Rating-Button)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Typ "yes" um die Dashboards wiederherzustellen'
        required: true
        default: 'no'

jobs:
  restore:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore dashboard files from git history + add rating button
        run: |
          python3 << 'PYEOF'
          import subprocess, re

          # Get original file content from commit 829184b (before placeholder)
          for htmlfile in ['index.html', 'dax.html', 'sp500.html']:
              result = subprocess.run(
                  ['git', 'show', f'829184b:{htmlfile}'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"ERROR: Could not read {htmlfile} from 829184b")
                  exit(1)
              content = result.stdout
              is_dax = htmlfile == 'dax.html'

              # 1. Add ratings state
              content = content.replace(
                  '  const [signals, setSignals] = useState({});',
                  '  const [signals, setSignals] = useState({});\n'
                  '  const [ratings, setRatings] = useState({});\n'
                  '  const [ratingModal, setRatingModal] = useState(null);',
                  1
              )

              # 2. Add ratings useEffect
              old_ue = ('  useEffect(() => {\n'
                        '    fetch("signals.json")\n'
                        '      .then(r => r.ok ? r.json() : {})\n'
                        '      .then(json => setSignals(json))\n'
                        '      .catch(() => {});\n'
                        '  }, []);')
              new_ue = old_ue + ('\n\n'
                  '  useEffect(() => {\n'
                  '    fetch("ratings/index.json")\n'
                  '      .then(r => r.ok ? r.json() : { ratings: [] })\n'
                  '      .then(json => {\n'
                  '        const map = {};\n'
                  '        (json.ratings || []).forEach(r => {\n'
                  '          const k = r.ticker.toUpperCase();\n'
                  '          map[k] = r;\n'
                  "          const base = k.replace(/\\.[^.]+$/, '');\n"
                  '          if (base !== k) map[base] = r;\n'
                  '        });\n'
                  '        setRatings(map);\n'
                  '      })\n'
                  '      .catch(() => {});\n'
                  '  }, []);')
              content = content.replace(old_ue, new_ue, 1)

              # 3. Add rating variable in map callback
              old_map = ('            const structs    = structureMap[item.t] || {};\n'
                         '            const isBOC      = structs.weekly?.broken && structs.daily?.broken && structs.h4?.broken4h;')
              new_map = old_map + ("\n            const rating     = ratings[item.t.toUpperCase()] "
                                   "|| ratings[item.t.replace(/\\.[^.]+$/,'').toUpperCase()];")
              content = content.replace(old_map, new_map, 1)

              # 4. Add rating button in ticker cell
              if is_dax:
                  old_t = ('                  {displayTicker(item.t)}\n'
                           '                  {hasChart && <span style={{fontSize:8,color:"#334155",marginLeft:2}}>▸</span>}\n'
                           '                </span>')
                  new_t = (old_t.replace('                </span>',
                      '                  {rating && (\n'
                      '                    <span onClick={e => { e.stopPropagation(); setRatingModal(item.t); }}\n'
                      '                      title={`Bewertung · ${rating.verdict} · Score ${rating.score}`}\n'
                      '                      style={{fontSize:8,background:"#0d1f3c",color:"#60a5fa",padding:"1px 4px",borderRadius:3,marginLeft:3,cursor:"pointer",border:"1px solid #1e3a5f",lineHeight:1.5,flexShrink:0}}>★</span>\n'
                      '                  )}\n'
                      '                </span>'))
              else:
                  old_t = ('                  {item.t}\n'
                           '                  {hasChart && <span style={{fontSize:8,color:"#334155",marginLeft:2}}>▸</span>}\n'
                           '                </span>')
                  new_t = (old_t.replace('                </span>',
                      '                  {rating && (\n'
                      '                    <span onClick={e => { e.stopPropagation(); setRatingModal(item.t); }}\n'
                      '                      title={`Bewertung · ${rating.verdict} · Score ${rating.score}`}\n'
                      '                      style={{fontSize:8,background:"#0d1f3c",color:"#60a5fa",padding:"1px 4px",borderRadius:3,marginLeft:3,cursor:"pointer",border:"1px solid #1e3a5f",lineHeight:1.5,flexShrink:0}}>★</span>\n'
                      '                  )}\n'
                      '                </span>'))
              content = content.replace(old_t, new_t, 1)

              # 5. Add modal before closing div
              dax_title = "{r ? displayTicker(ratingModal) : ratingModal}" if is_dax else "{ratingModal}"
              old_footer = ('      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:8}}>\n'
                            '        Echte Daten via yfinance · Kein Handelssignal · Stand {data.timestamp}\n'
                            '      </p>\n'
                            '    </div>\n'
                            '  );\n'
                            '}')
              new_footer = ('      <p style={{textAlign:"center",color:"#1e293b",fontSize:9,marginTop:8}}>\n'
                            '        Echte Daten via yfinance · Kein Handelssignal · Stand {data.timestamp}\n'
                            '      </p>\n\n'
                            '      {ratingModal && (() => {\n'
                            "        const r = ratings[ratingModal.toUpperCase()] || ratings[ratingModal.replace(/\\.[^.]+$/,'').toUpperCase()];\n"
                            '        return (\n'
                            '          <div onClick={() => setRatingModal(null)}\n'
                            '            style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16,overflowY:"auto"}}>\n'
                            '            <div onClick={e => e.stopPropagation()}\n'
                            '              style={{width:"100%",maxWidth:980,background:"#060b14",borderRadius:10,border:"1px solid #1e2d45",overflow:"hidden",display:"flex",flexDirection:"column",marginTop:8}}>\n'
                            '              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid #1e2d45",background:"#0d1526"}}>\n'
                            '                <div style={{display:"flex",alignItems:"center",gap:10}}>\n'
                            f'                  <span style={{{{fontSize:13,fontWeight:700,color:"#94a3b8",fontFamily:"monospace"}}}}>Aktienbewertung · {dax_title}</span>\n'
                            '                  {r && <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,background: r.verdict==="BUY"?"#1a3a0a":r.verdict==="HOLD"?"#2a1f05":"#3a0a0a",color: r.verdict==="BUY"?"#86c429":r.verdict==="HOLD"?"#f59e0b":"#f87171",border:`1px solid ${r.verdict==="BUY"?"#639922":r.verdict==="HOLD"?"#b45309":"#A32D2D"}`}}>{r.verdict} · Score {r.score}</span>}\n'
                            '                  {r && <span style={{fontSize:10,color:"#475569"}}>Erstellt: {new Date(r.created_at).toLocaleDateString(\'de-DE\')}</span>}\n'
                            '                </div>\n'
                            '                <button onClick={() => setRatingModal(null)}\n'
                            '                  style={{background:"transparent",border:"1px solid #1e2d45",color:"#94a3b8",cursor:"pointer",fontSize:13,borderRadius:4,padding:"3px 10px"}}> Schließen</button>\n'
                            '              </div>\n'
                            '              <iframe src={`ratings/${r ? r.ticker.toLowerCase() : ratingModal.toLowerCase()}.html`}\n'
                            '                style={{border:"none",width:"100%",height:"85vh"}} title={`Bewertung ${ratingModal}`}/>\n'
                            '            </div>\n'
                            '          </div>\n'
                            '        );\n'
                            '      })()}\n'
                            '    </div>\n'
                            '  );\n'
                            '}')
              content = content.replace(old_footer, new_footer, 1)

              with open(htmlfile, 'w') as f:
                  f.write(content)
              print(f"✅ {htmlfile}: {len(content)} chars written")
          PYEOF

      - name: Commit and push restored dashboards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dax.html sp500.html
          git diff --staged --stat
          git commit -m "Bewertungs-Button: Dashboards wiederhergestellt (QQQ, DAX, SPX)

          - Automatische Wiederherstellung via restore_dashboards workflow
          - Basis: Commit 829184b + Rating-Button-Feature
          - index.html, dax.html, sp500.html: Bewertungs-Button (★) in Ticker-Zelle"
          git push origin main
