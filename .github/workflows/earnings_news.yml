name: Earnings-Highlights (NEWS!)

on:
  schedule:
    # Mo–Fr 06:00 UTC = 08:00 CEST / 07:00 MEZ
    # Finnhub hat Earnings-Daten vom Vortag bereits verfügbar
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      min_surprise_pct:
        description: 'Minimale EPS-Überraschung in % (Standard: 5)'
        required: false
        default: '5'
      max_highlights:
        description: 'Max. Aktien pro Mail (Standard: 15)'
        required: false
        default: '15'

jobs:
  earnings-highlights:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas matplotlib requests

      - name: Earnings-Highlights prüfen und mailen
        env:
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO:   ${{ secrets.ALERT_EMAIL_TO }}
          FINNHUB_API_KEY:  ${{ secrets.FINNHUB_API_KEY }}
          MIN_SURPRISE_PCT: ${{ github.event.inputs.min_surprise_pct || '5' }}
          MAX_HIGHLIGHTS:   ${{ github.event.inputs.max_highlights || '15' }}
        run: python earnings_alerts.py
